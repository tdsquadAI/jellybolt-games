<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Maze Runner — JellyBolt Games</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow-x:hidden;background:#0a0a1a;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif}
body{display:flex;flex-direction:column;min-height:100vh;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
a{color:#00e5ff;text-decoration:none}a:hover{text-decoration:underline}
.screen{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.screen.active{display:flex}
h1{font-size:clamp(2rem,6vw,3.5rem);text-align:center;background:linear-gradient(135deg,#00e5ff,#00e676);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;text-shadow:0 0 30px rgba(0,229,255,.3)}
.subtitle{color:#888;font-size:1rem;margin-bottom:30px;text-align:center}
.card{background:rgba(26,26,62,.6);border:1px solid rgba(0,229,255,.2);border-radius:16px;padding:24px;margin:10px;max-width:500px;width:100%;backdrop-filter:blur(10px)}
.card h2{color:#00e5ff;margin-bottom:16px;font-size:1.2rem;text-align:center}
.btn-group{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.btn{background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.4);color:#00e5ff;padding:10px 24px;border-radius:10px;cursor:pointer;font-size:1rem;font-family:inherit;transition:all .2s}
.btn:hover{background:rgba(0,229,255,.25);box-shadow:0 0 15px rgba(0,229,255,.3)}
.btn:active{transform:scale(.96)}
.btn.selected{background:rgba(0,229,255,.3);border-color:#00e5ff;box-shadow:0 0 12px rgba(0,229,255,.4)}
.btn.primary{background:linear-gradient(135deg,rgba(0,229,255,.3),rgba(0,230,118,.3));border-color:#00e676;color:#00e676;font-size:1.1rem;padding:12px 40px}
.btn.primary:hover{box-shadow:0 0 20px rgba(0,230,118,.4)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.toggle-row label{color:#ccc;font-size:.95rem}
.toggle{position:relative;width:48px;height:26px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:#333;border-radius:13px;transition:.3s}
.toggle .slider::before{content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;background:#888;border-radius:50%;transition:.3s}
.toggle input:checked+.slider{background:rgba(0,229,255,.4);border:1px solid #00e5ff}
.toggle input:checked+.slider::before{transform:translateX(22px);background:#00e5ff;box-shadow:0 0 8px #00e5ff}
#game-screen{padding:10px;gap:8px}
.game-hud{display:flex;gap:16px;align-items:center;justify-content:center;flex-wrap:wrap;padding:6px 16px;background:rgba(26,26,62,.5);border:1px solid rgba(0,229,255,.15);border-radius:12px;font-size:.9rem}
.hud-item{display:flex;align-items:center;gap:5px}.hud-item .icon{font-size:1.1rem}.hud-item .val{color:#00e5ff;font-weight:700;min-width:50px}
.canvas-wrap{position:relative;flex:1;display:flex;align-items:center;justify-content:center;width:100%;max-height:70vh}
#mazeCanvas{border:1px solid rgba(0,229,255,.2);border-radius:8px;max-width:100%;max-height:100%;image-rendering:pixelated}
#minimap{position:absolute;top:8px;right:8px;border:1px solid rgba(0,229,255,.3);border-radius:6px;background:rgba(10,10,26,.85);pointer-events:none}
.game-controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:4px}
.dpad{display:none;position:relative;width:150px;height:150px;margin:0 auto}
.dpad-btn{position:absolute;width:48px;height:48px;background:rgba(0,229,255,.12);border:1px solid rgba(0,229,255,.35);border-radius:12px;color:#00e5ff;font-size:1.3rem;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.dpad-btn:active{background:rgba(0,229,255,.35)}
.dpad-up{top:0;left:50%;transform:translateX(-50%)}
.dpad-down{bottom:0;left:50%;transform:translateX(-50%)}
.dpad-left{left:0;top:50%;transform:translateY(-50%)}
.dpad-right{right:0;top:50%;transform:translateY(-50%)}
.completion-stats{width:100%;max-width:360px}
.stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(0,229,255,.1)}
.stat-row:last-child{border-bottom:none}
.stat-label{color:#aaa}.stat-value{color:#00e5ff;font-weight:700}
.score-big{text-align:center;font-size:2.5rem;color:#00e676;font-weight:800;margin:16px 0;text-shadow:0 0 20px rgba(0,230,118,.4)}
footer{background:rgba(26,26,62,.4);border-top:1px solid rgba(0,229,255,.1);padding:20px;text-align:center;font-size:.85rem;color:#888}
footer .links{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
footer .social{display:flex;gap:14px;justify-content:center;margin-top:10px}
footer .social a{display:inline-flex;align-items:center;gap:4px;color:#aaa;font-size:.8rem;padding:4px 10px;border:1px solid rgba(255,255,255,.1);border-radius:6px;transition:all .2s}
footer .social a:hover{color:#00e5ff;border-color:rgba(0,229,255,.3)}
.made{margin-top:10px;color:#666;font-size:.8rem}
@media(max-width:600px){.game-hud{font-size:.8rem;gap:10px;padding:4px 10px}.dpad.show{display:block}}
</style>

<body>

<!-- ===== START SCREEN ===== -->
<div id="start-screen" class="screen active">
  <h1>⚡ Maze Runner</h1>
  <p class="subtitle">Navigate the neon labyrinth</p>

  <div class="card">
    <h2>Select Difficulty</h2>
    <div class="btn-group" id="diff-btns">
      <button class="btn selected" data-size="10">🟢 Small (10×10)</button>

  <div class="card">

<!-- ===== GAME SCREEN ===== -->
<div id="game-screen" class="screen">

  <div class="dpad" id="dpad">
    <div class="dpad-btn dpad-up" data-dir="up">▲</div>

      <div class="stat-row"><span class="stat-label">🎯 Optimal</span><span class="stat-value" id="stat-optimal">—</span></div>

</div>

<script>
(function(){
"use strict";

/* ========== CONSTANTS & STATE ========== */
const SIZES = {10:'Small',20:'Medium',30:'Large'};
const SIZE_ORDER = [10,20,30];
const DIRS = [{dr:-1,dc:0,wall:'N',opp:'S'},{dr:1,dc:0,wall:'S',opp:'N'},{dr:0,dc:-1,wall:'W',opp:'E'},{dr:0,dc:1,wall:'E',opp:'W'}];

let state = {
  rows:10, cols:10, grid:null,
  playerR:0, playerC:0,
  animX:0, animY:0, animating:false,
  exitR:0, exitC:0,
  visited:null, fogEnabled:false,
  moves:0, startTime:0, elapsed:0, timerRunning:false,
  optimalPath:[], showSolution:false,
  currentSizeIdx:0, gameOver:false
};

let cellPx, canvas, ctx, mmCanvas, mmCtx;
let animFrame;
let timerInterval;
let pulsePhase = 0;

/* ========== DOM REFS ========== */
const $ = id => document.getElementById(id);
const screens = {start:$('start-screen'), game:$('game-screen'), complete:$('complete-screen')};

function showScreen(name){
  Object.values(screens).forEach(s=>s.classList.remove('active'));
  screens[name].classList.add('active');
}

/* ========== DIFFICULTY BUTTONS ========== */
document.querySelectorAll('#diff-btns .btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('#diff-btns .btn').forEach(x=>x.classList.remove('selected'));
    b.classList.add('selected');
    state.currentSizeIdx = SIZE_ORDER.indexOf(+b.dataset.size);
  });
});

$('start-btn').addEventListener('click',()=>{
  state.fogEnabled = $('fog-toggle').checked;
  startGame(SIZE_ORDER[state.currentSizeIdx]);
});

$('new-maze-btn').addEventListener('click',()=>startGame(state.rows));
$('fog-btn').addEventListener('click',()=>{
  state.fogEnabled = !state.fogEnabled;
  $('fog-btn').textContent = state.fogEnabled ? '🌫️ Fog: ON' : '🌫️ Fog: OFF';
  render();
});
$('solve-btn').addEventListener('click',()=>{
  state.showSolution = !state.showSolution;
  $('solve-btn').textContent = state.showSolution ? '💡 Hide Solution' : '💡 Show Solution';
  render();
});
$('next-level-btn').addEventListener('click',()=>{
  state.currentSizeIdx = Math.min(state.currentSizeIdx+1, SIZE_ORDER.length-1);
  startGame(SIZE_ORDER[state.currentSizeIdx]);
});
$('replay-btn').addEventListener('click',()=>startGame(state.rows));
$('menu-btn').addEventListener('click',()=>showScreen('start'));

/* ========== MAZE GENERATION (Recursive Backtracking) ========== */
function createGrid(rows,cols){
  const g = [];
  for(let r=0;r<rows;r++){
    g[r]=[];
    for(let c=0;c<cols;c++) g[r][c]={N:true,S:true,E:true,W:true,visited:false};
  }
  return g;
}

function generateMaze(rows,cols){
  const grid = createGrid(rows,cols);
  // Iterative backtracking with explicit stack to avoid call-stack overflow on large mazes
  const stack = [];
  const startR = 0, startC = 0;
  grid[startR][startC].visited = true;
  stack.push({r:startR,c:startC});

  while(stack.length > 0){
    const cur = stack[stack.length-1];
    const neighbors = [];
    for(const d of DIRS){
      const nr = cur.r+d.dr, nc = cur.c+d.dc;
      if(nr>=0 && nr<rows && nc>=0 && nc<cols && !grid[nr][nc].visited){
        neighbors.push({r:nr,c:nc,wall:d.wall,opp:d.opp});
      }
    }
    if(neighbors.length===0){
      stack.pop();
    } else {
      const next = neighbors[Math.floor(Math.random()*neighbors.length)];
      grid[cur.r][cur.c][next.wall] = false;
      grid[next.r][next.c][next.opp] = false;
      grid[next.r][next.c].visited = true;
      stack.push({r:next.r,c:next.c});
    }
  }
  return grid;
}

/* ========== BFS SHORTEST PATH ========== */
function bfs(grid,sr,sc,er,ec){
  const rows=grid.length, cols=grid[0].length;
  const visited = Array.from({length:rows},()=>Array(cols).fill(false));
  const prev = Array.from({length:rows},()=>Array(cols).fill(null));
  const queue = [{r:sr,c:sc}];
  visited[sr][sc] = true;
  const wallMap = {N:{dr:-1,dc:0},S:{dr:1,dc:0},E:{dr:0,dc:1},W:{dr:0,dc:-1}};

  while(queue.length){
    const {r,c} = queue.shift();
    if(r===er && c===ec){
      const path = [];
      let cur = {r,c};
      while(cur){ path.unshift(cur); cur = prev[cur.r][cur.c]; }
      return path;
    }
    for(const wallName of ['N','S','E','W']){
      if(!grid[r][c][wallName]){
        const d = wallMap[wallName];
        const nr=r+d.dr, nc=c+d.dc;
        if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&!visited[nr][nc]){
          visited[nr][nc]=true;
          prev[nr][nc]={r,c};
          queue.push({r:nr,c:nc});
        }
      }
    }
  }
  return [];
}

/* ========== GAME START ========== */
function startGame(size){
  cancelAnimationFrame(animFrame);
  clearInterval(timerInterval);

  state.rows = size; state.cols = size;
  state.grid = generateMaze(size,size);
  state.playerR = 0; state.playerC = 0;
  state.exitR = size-1; state.exitC = size-1;
  state.visited = Array.from({length:size},()=>Array(size).fill(false));
  state.visited[0][0] = true;
  state.moves = 0; state.elapsed = 0;
  state.startTime = performance.now();
  state.timerRunning = true;
  state.showSolution = false;
  state.gameOver = false;
  state.animating = false;

  state.optimalPath = bfs(state.grid,0,0,state.exitR,state.exitC);

  canvas = $('mazeCanvas');
  ctx = canvas.getContext('2d');
  mmCanvas = $('minimap');
  mmCtx = mmCanvas.getContext('2d');

  sizeCanvas();
  state.animX = state.playerC * cellPx + cellPx/2;
  state.animY = state.playerR * cellPx + cellPx/2;

  $('hud-moves').textContent = '0';
  $('hud-time').textContent = '00:00';
  $('hud-level').textContent = SIZES[size]||size+'×'+size;
  $('fog-btn').textContent = state.fogEnabled ? '🌫️ Fog: ON' : '🌫️ Fog: OFF';
  $('solve-btn').textContent = '💡 Show Solution';
  state.currentSizeIdx = SIZE_ORDER.indexOf(size);

  const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints>0;
  $('dpad').classList.toggle('show', isMobile);

  showScreen('game');
  timerInterval = setInterval(updateTimer, 100);
  gameLoop();
}

function sizeCanvas(){
  const wrap = canvas.parentElement;
  const maxW = wrap.clientWidth - 16;
  const maxH = wrap.clientHeight - 16 || window.innerHeight*0.65;
  const maxDim = Math.min(maxW, maxH, 700);
  cellPx = Math.floor(maxDim / state.cols);
  const totalPx = cellPx * state.cols;
  canvas.width = totalPx;
  canvas.height = cellPx * state.rows;

  const mmSize = Math.min(120, Math.floor(maxDim*0.2));
  mmCanvas.width = mmSize;
  mmCanvas.height = mmSize;
}

/* ========== TIMER ========== */
function updateTimer(){
  if(!state.timerRunning) return;
  state.elapsed = (performance.now()-state.startTime)/1000;
  const mins = Math.floor(state.elapsed/60);
  const secs = Math.floor(state.elapsed%60);
  $('hud-time').textContent = String(mins).padStart(2,'0')+':'+String(secs).padStart(2,'0');
}

/* ========== MOVEMENT ========== */
function tryMove(dir){
  if(state.animating || state.gameOver) return;
  const {playerR:r,playerC:c,grid} = state;
  let wallName;
  if(dir==='up') wallName='N';
  else if(dir==='down') wallName='S';
  else if(dir==='left') wallName='W';
  else if(dir==='right') wallName='E';
  else return;

  if(grid[r][c][wallName]) return; // wall blocks

  const d = {N:{dr:-1,dc:0},S:{dr:1,dc:0},E:{dr:0,dc:1},W:{dr:0,dc:-1}}[wallName];
  const nr = r+d.dr, nc = c+d.dc;
  if(nr<0||nr>=state.rows||nc<0||nc>=state.cols) return;

  state.playerR = nr; state.playerC = nc;
  state.visited[nr][nc] = true;
  state.moves++;
  $('hud-moves').textContent = state.moves;

  // Animate
  animatePlayer(nc*cellPx+cellPx/2, nr*cellPx+cellPx/2);

  if(nr===state.exitR && nc===state.exitC){
    state.gameOver = true;
    state.timerRunning = false;
    setTimeout(showCompletion, 600);
  }
}

function animatePlayer(tx,ty){
  state.animating = true;
  const sx = state.animX, sy = state.animY;
  const duration = 100; // ms
  const start = performance.now();
  function step(now){
    let t = Math.min((now-start)/duration, 1);
    t = t<0.5 ? 2*t*t : -1+(4-2*t)*t; // ease in-out
    state.animX = sx + (tx-sx)*t;
    state.animY = sy + (ty-sy)*t;
    if(t<1) requestAnimationFrame(step);
    else { state.animX=tx; state.animY=ty; state.animating=false; }
  }
  requestAnimationFrame(step);
}

/* ========== RENDERING ========== */
function gameLoop(){
  pulsePhase += 0.03;
  render();
  renderMinimap();
  animFrame = requestAnimationFrame(gameLoop);
}

function render(){
  const {rows,cols,grid,visited,fogEnabled,animX,animY,optimalPath,showSolution} = state;
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);

  // Background
  ctx.fillStyle='#0a0a1a';
  ctx.fillRect(0,0,w,h);

  // Determine visible cells for fog
  let fogVisible = null;
  if(fogEnabled){
    fogVisible = Array.from({length:rows},()=>Array(cols).fill(false));
    const pr=state.playerR, pc=state.playerC, rad=3;
    for(let dr=-rad;dr<=rad;dr++) for(let dc=-rad;dc<=rad;dc++){
      const r2=pr+dr, c2=pc+dc;
      if(r2>=0&&r2<rows&&c2>=0&&c2<cols && Math.abs(dr)+Math.abs(dc)<=rad+1) fogVisible[r2][c2]=true;
    }
  }

  // Draw visited trail
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    if(fogEnabled && !fogVisible[r][c]) continue;
    if(visited[r][c]){
      ctx.fillStyle='rgba(0,229,255,0.07)';
      ctx.fillRect(c*cellPx, r*cellPx, cellPx, cellPx);
    }
  }

  // Solution path
  if(showSolution && optimalPath.length>1){
    ctx.strokeStyle='rgba(0,230,118,0.35)';
    ctx.lineWidth=cellPx*0.2;
    ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();
    ctx.moveTo(optimalPath[0].c*cellPx+cellPx/2, optimalPath[0].r*cellPx+cellPx/2);
    for(let i=1;i<optimalPath.length;i++){
      ctx.lineTo(optimalPath[i].c*cellPx+cellPx/2, optimalPath[i].r*cellPx+cellPx/2);
    }
    ctx.stroke();
  }

  // Draw walls
  ctx.strokeStyle='#00e5ff';
  ctx.lineWidth = Math.max(1.5, cellPx*0.06);
  ctx.shadowColor='#00e5ff';
  ctx.shadowBlur=cellPx>12?4:2;

  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    if(fogEnabled && !fogVisible[r][c]) continue;
    const x=c*cellPx, y=r*cellPx;
    const cell=grid[r][c];
    if(cell.N){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+cellPx,y);ctx.stroke();}
    if(cell.S){ctx.beginPath();ctx.moveTo(x,y+cellPx);ctx.lineTo(x+cellPx,y+cellPx);ctx.stroke();}
    if(cell.W){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+cellPx);ctx.stroke();}
    if(cell.E){ctx.beginPath();ctx.moveTo(x+cellPx,y);ctx.lineTo(x+cellPx,y+cellPx);ctx.stroke();}
  }
  ctx.shadowBlur=0;

  // Draw outer border
  ctx.strokeStyle='#00e5ff';
  ctx.lineWidth=2;
  ctx.strokeRect(0,0,w,h);

  // Exit beacon
  if(!fogEnabled || fogVisible[state.exitR][state.exitC]){
    const ex=state.exitC*cellPx+cellPx/2, ey=state.exitR*cellPx+cellPx/2;
    const ep = 0.5+0.5*Math.sin(pulsePhase*2);
    const gr = ctx.createRadialGradient(ex,ey,0,ex,ey,cellPx*0.6+ep*cellPx*0.2);
    gr.addColorStop(0,'rgba(0,230,118,0.9)');
    gr.addColorStop(0.5,'rgba(0,230,118,0.3)');
    gr.addColorStop(1,'rgba(0,230,118,0)');
    ctx.fillStyle=gr;
    ctx.beginPath();ctx.arc(ex,ey,cellPx*0.7+ep*cellPx*0.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#00e676';
    ctx.beginPath();ctx.arc(ex,ey,cellPx*0.22,0,Math.PI*2);ctx.fill();
  }

  // Player orb
  const pp = 0.5+0.5*Math.sin(pulsePhase*3);
  const pgr = ctx.createRadialGradient(animX,animY,0,animX,animY,cellPx*0.5+pp*cellPx*0.12);
  pgr.addColorStop(0,'rgba(0,229,255,1)');
  pgr.addColorStop(0.4,'rgba(0,229,255,0.5)');
  pgr.addColorStop(1,'rgba(0,229,255,0)');
  ctx.fillStyle=pgr;
  ctx.beginPath();ctx.arc(animX,animY,cellPx*0.55+pp*cellPx*0.12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#00e5ff';
  ctx.shadowColor='#00e5ff';ctx.shadowBlur=8;
  ctx.beginPath();ctx.arc(animX,animY,cellPx*0.2,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  // Fog overlay
  if(fogEnabled){
    ctx.fillStyle='rgba(5,5,15,0.92)';
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      if(!fogVisible[r][c]) ctx.fillRect(c*cellPx, r*cellPx, cellPx, cellPx);
    }
    // Soft radial edge around player
    const fogR = cellPx*(3.5);
    const fg = ctx.createRadialGradient(animX,animY,cellPx*2,animX,animY,fogR);
    fg.addColorStop(0,'rgba(5,5,15,0)');
    fg.addColorStop(1,'rgba(5,5,15,0.6)');
    ctx.fillStyle=fg;
    ctx.fillRect(0,0,w,h);
  }
}

function renderMinimap(){
  const {rows,cols,grid,visited} = state;
  const mmW=mmCanvas.width, mmH=mmCanvas.height;
  const cs = Math.min(mmW/cols, mmH/rows);
  mmCtx.clearRect(0,0,mmW,mmH);
  mmCtx.fillStyle='rgba(10,10,26,0.9)';
  mmCtx.fillRect(0,0,mmW,mmH);

  // Explored cells
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    if(visited[r][c]){
      mmCtx.fillStyle='rgba(0,229,255,0.15)';
      mmCtx.fillRect(c*cs, r*cs, cs, cs);
    }
  }

  // Walls
  mmCtx.strokeStyle='rgba(0,229,255,0.35)';
  mmCtx.lineWidth=0.5;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const x=c*cs, y=r*cs, cell=grid[r][c];
    if(cell.N){mmCtx.beginPath();mmCtx.moveTo(x,y);mmCtx.lineTo(x+cs,y);mmCtx.stroke();}
    if(cell.S){mmCtx.beginPath();mmCtx.moveTo(x,y+cs);mmCtx.lineTo(x+cs,y+cs);mmCtx.stroke();}
    if(cell.W){mmCtx.beginPath();mmCtx.moveTo(x,y);mmCtx.lineTo(x,y+cs);mmCtx.stroke();}
    if(cell.E){mmCtx.beginPath();mmCtx.moveTo(x+cs,y);mmCtx.lineTo(x+cs,y+cs);mmCtx.stroke();}
  }

  // Exit dot
  mmCtx.fillStyle='#00e676';
  mmCtx.beginPath();mmCtx.arc(state.exitC*cs+cs/2, state.exitR*cs+cs/2, Math.max(2,cs*0.4),0,Math.PI*2);mmCtx.fill();

  // Player dot (blinking)
  if(Math.sin(pulsePhase*5)>-0.3){
    mmCtx.fillStyle='#00e5ff';
    mmCtx.beginPath();mmCtx.arc(state.playerC*cs+cs/2, state.playerR*cs+cs/2, Math.max(2,cs*0.45),0,Math.PI*2);mmCtx.fill();
  }

  // Border
  mmCtx.strokeStyle='rgba(0,229,255,0.4)';
  mmCtx.lineWidth=1;
  mmCtx.strokeRect(0,0,cols*cs, rows*cs);
}

/* ========== COMPLETION ========== */
function showCompletion(){
  clearInterval(timerInterval);
  cancelAnimationFrame(animFrame);
  const secs = Math.floor(state.elapsed);
  const mins = Math.floor(secs/60);
  const s = secs%60;
  const timeStr = String(mins).padStart(2,'0')+':'+String(s).padStart(2,'0');
  const optMoves = state.optimalPath.length-1;
  const mazeSize = state.rows*state.cols;
  const baseScore = mazeSize*100;
  const movesPenalty = Math.max(0, state.moves-optMoves)*5;
  const timePenalty = secs*2;
  const score = Math.max(0, baseScore-movesPenalty-timePenalty);

  $('stat-time').textContent = timeStr;
  $('stat-moves').textContent = state.moves;
  $('stat-optimal').textContent = optMoves;
  $('stat-diff').textContent = SIZES[state.rows]||state.rows+'×'+state.rows;
  $('final-score').textContent = score.toLocaleString();

  // Hide next-level if already at max
  $('next-level-btn').style.display = state.currentSizeIdx>=SIZE_ORDER.length-1?'none':'inline-flex';
  showScreen('complete');
}

/* ========== KEYBOARD INPUT ========== */
document.addEventListener('keydown', e=>{
  if(screens.game.classList.contains('active') && !state.gameOver){
    const map={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',W:'up',a:'left',A:'left',s:'down',S:'down',d:'right',D:'right'};
    const dir=map[e.key];
    if(dir){e.preventDefault();tryMove(dir);}
  }
});

/* ========== TOUCH / SWIPE ========== */
let touchStartX=0,touchStartY=0,touchStartTime=0;
canvas = $('mazeCanvas');
document.addEventListener('touchstart',e=>{
  if(!screens.game.classList.contains('active')) return;
  const t=e.touches[0]; touchStartX=t.clientX; touchStartY=t.clientY; touchStartTime=Date.now();
},{passive:true});
document.addEventListener('touchend',e=>{
  if(!screens.game.classList.contains('active')||state.gameOver) return;
  const t=e.changedTouches[0];
  const dx=t.clientX-touchStartX, dy=t.clientY-touchStartY;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<25) return; // too short
  if(Date.now()-touchStartTime>500) return; // too slow
  if(Math.abs(dx)>Math.abs(dy)) tryMove(dx>0?'right':'left');
  else tryMove(dy>0?'down':'up');
},{passive:true});

// Prevent scroll on game screen
document.addEventListener('touchmove',e=>{
  if(screens.game.classList.contains('active')) e.preventDefault();
},{passive:false});

/* ========== D-PAD ========== */
document.querySelectorAll('.dpad-btn').forEach(b=>{
  const handler = e=>{e.preventDefault();e.stopPropagation();tryMove(b.dataset.dir);};
  b.addEventListener('touchstart',handler,{passive:false});
  b.addEventListener('click',handler);
});

/* ========== RESIZE ========== */
let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{
    if(screens.game.classList.contains('active') && state.grid){
      const oldCellPx = cellPx;
      sizeCanvas();
      // Recalculate anim position
      state.animX = state.animX / oldCellPx * cellPx;
      state.animY = state.animY / oldCellPx * cellPx;
      render(); renderMinimap();
    }
  },150);
});

})();
</script>
