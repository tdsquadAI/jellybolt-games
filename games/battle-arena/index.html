<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
// Game Constants
const GAME_WIDTH = 800;
const GAME_HEIGHT = 600;
const GROUND_Y = 500;
const ROUND_TIME = 60;

// Character stats: speed, jumpPower, maxHealth, punchDamage, kickDamage, specialDamage, specialCooldown
const CHARACTERS = {
  warrior: { name: 'Warrior', color: 0xff6b6b, speed: 250, jumpPower: 500, maxHealth: 120, punchDamage: 8, kickDamage: 12, specialDamage: 20, specialCooldown: 5000, special: 'fireball' },
  ninja: { name: 'Ninja', color: 0x58a6ff, speed: 350, jumpPower: 600, maxHealth: 90, punchDamage: 6, kickDamage: 10, specialDamage: 25, specialCooldown: 3000, special: 'dash' },
  mage: { name: 'Mage', color: 0xbc8cff, speed: 200, jumpPower: 450, maxHealth: 80, punchDamage: 10, kickDamage: 8, specialDamage: 30, specialCooldown: 4000, special: 'fireball' },
  berserker: { name: 'Berserker', color: 0xff9f43, speed: 220, jumpPower: 480, maxHealth: 150, punchDamage: 12, kickDamage: 15, specialDamage: 18, specialCooldown: 6000, special: 'counter' }
};

// Game State
let gameState = {
  scene: 'menu', // menu, characterSelect, playing, roundEnd, gameOver
  selectedCharacter: null,
  aiCharacter: null,
  difficulty: 'medium', // easy, medium, hard
  playerWins: 0,
  aiWins: 0,
  currentRound: 0,
  roundTime: ROUND_TIME,
  stats: {
    wins: parseInt(localStorage.getItem('ba_wins') || '0'),
    losses: parseInt(localStorage.getItem('ba_losses') || '0')
  }
};

// Phaser Game Configuration
const config = {
  type: Phaser.AUTO,
  width: GAME_WIDTH,
  height: GAME_HEIGHT,
  parent: 'game-container',
  backgroundColor: '#1a1a2e',
  physics: {
    default: 'arcade',
    arcade: {
      gravity: { y: 1200 },
      debug: false
    }
  },
  scene: {
    preload: preload,
    create: create,
    update: update
  }
};

const game = new Phaser.Game(config);

// Scene variables
let player, ai, platforms, projectiles, effects;
let cursors, keys;
let playerHealthBar, aiHealthBar, roundTimer, roundText, statsText;
let playerLastSpecial = 0, aiLastSpecial = 0;
let playerIsAttacking = false, aiIsAttacking = false;
let koEffect = null;

function preload() {
  // No assets needed - using simple graphics
}

function create() {
  this.scene = this;
  
  // Create platforms
  platforms = this.physics.add.staticGroup();
  const ground = this.add.rectangle(GAME_WIDTH / 2, GROUND_Y, GAME_WIDTH, 20, 0x444466);
  platforms.add(ground);
  ground.body.setSize(GAME_WIDTH, 20);
  
  // Platform decoration
  this.add.rectangle(GAME_WIDTH / 2, GROUND_Y + 10, GAME_WIDTH, 100, 0x222233);
  
  // Create projectiles and effects groups
  projectiles = this.physics.add.group();
  effects = this.add.group();
  
  // Input setup
  cursors = this.input.keyboard.createCursorKeys();
  keys = {
    z: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.Z),
    x: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.X),
    c: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.C),
    space: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE),
    enter: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ENTER),
    num1: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ONE),
    num2: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.TWO),
    num3: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.THREE),
    num4: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.FOUR)
  };
  
  // UI Elements
  createUI.call(this);
  
  // Show menu
  showMenu.call(this);
}

function createUI() {
  // Health bars background
  this.add.rectangle(150, 40, 260, 30, 0x222244).setStrokeStyle(2, 0xffffff);
  this.add.rectangle(GAME_WIDTH - 150, 40, 260, 30, 0x222244).setStrokeStyle(2, 0xffffff);
  
  // Health bars
  playerHealthBar = this.add.rectangle(150, 40, 250, 20, 0x00ff88);
  aiHealthBar = this.add.rectangle(GAME_WIDTH - 150, 40, 250, 20, 0xff6b6b);
  
  // Round timer
  roundText = this.add.text(GAME_WIDTH / 2, 40, '', {
    fontSize: '32px',
    fontWeight: 'bold',
    fill: '#ffffff',
    stroke: '#000000',
    strokeThickness: 4
  }).setOrigin(0.5);
  
  // Stats text
  statsText = this.add.text(GAME_WIDTH / 2, 80, '', {
    fontSize: '18px',
    fill: '#00ff88',
    stroke: '#000000',
    strokeThickness: 3
  }).setOrigin(0.5);
  
  updateStatsDisplay.call(this);
}

function showMenu() {
  gameState.scene = 'menu';
  
  // Clear any existing entities
  if (player) player.destroy();
  if (ai) ai.destroy();
  projectiles.clear(true, true);
  effects.clear(true, true);
  
  // Menu background
  const menuBg = this.add.rectangle(GAME_WIDTH / 2, GAME_HEIGHT / 2 - 50, 600, 400, 0x14142a, 0.95);
  menuBg.setStrokeStyle(3, 0x00ff88);
  
  // Title
  const title = this.add.text(GAME_WIDTH / 2, 150, 'BATTLE ARENA', {
    fontSize: '56px',
    fontWeight: 'bold',
    fill: '#00ff88',
    stroke: '#000000',
    strokeThickness: 6
  }).setOrigin(0.5);
  
  // Instructions
  const instructions = this.add.text(GAME_WIDTH / 2, 250, 
    'Arrow Keys: Move & Jump\nZ: Punch  X: Kick  C: Special\n\nPress ENTER to Start', {
    fontSize: '18px',
    fill: '#ffffff',
    align: 'center',
    lineSpacing: 8
  }).setOrigin(0.5);
  
  // Difficulty selector
  const diffText = this.add.text(GAME_WIDTH / 2, 380, 
    `Difficulty: ${gameState.difficulty.toUpperCase()} (Space to change)`, {
    fontSize: '16px',
    fill: '#ffcc00'
  }).setOrigin(0.5);
  
  // Wait for enter key
  const enterListener = keys.enter.on('down', () => {
    keys.enter.off('down', enterListener);
    keys.space.off('down', spaceListener);
    menuBg.destroy();
    title.destroy();
    instructions.destroy();
    diffText.destroy();
    showCharacterSelect.call(this);
  });
  
  const spaceListener = keys.space.on('down', () => {
    if (gameState.difficulty === 'easy') gameState.difficulty = 'medium';
    else if (gameState.difficulty === 'medium') gameState.difficulty = 'hard';
    else gameState.difficulty = 'easy';
    diffText.setText(`Difficulty: ${gameState.difficulty.toUpperCase()} (Space to change)`);
  });
}

function showCharacterSelect() {
  gameState.scene = 'characterSelect';
  
  const menuBg = this.add.rectangle(GAME_WIDTH / 2, GAME_HEIGHT / 2 - 50, 700, 450, 0x14142a, 0.95);
  menuBg.setStrokeStyle(3, 0x00ff88);
  
  const title = this.add.text(GAME_WIDTH / 2, 130, 'SELECT YOUR FIGHTER', {
    fontSize: '36px',
    fontWeight: 'bold',
    fill: '#00ff88',
    stroke: '#000000',
    strokeThickness: 4
  }).setOrigin(0.5);
  
  // Character selection
  const charKeys = Object.keys(CHARACTERS);
  const charTexts = [];
  
  charKeys.forEach((key, index) => {
    const char = CHARACTERS[key];
    const x = 200 + (index % 2) * 400;
    const y = 220 + Math.floor(index / 2) * 100;
    
    const charBox = this.add.rectangle(x, y, 320, 80, 0x222244, 0.8);
    charBox.setStrokeStyle(2, char.color);
    
    const text = this.add.text(x, y - 15, `[${index + 1}] ${char.name}`, {
      fontSize: '24px',
      fontWeight: 'bold',
      fill: '#ffffff'
    }).setOrigin(0.5);
    
    const stats = this.add.text(x, y + 15, 
      `HP:${char.maxHealth} SPD:${Math.floor(char.speed/10)} JMP:${Math.floor(char.jumpPower/100)}`, {
      fontSize: '14px',
      fill: Phaser.Display.Color.IntegerToColor(char.color).rgba
    }).setOrigin(0.5);
    
    charTexts.push({ key, charBox, text, stats });
  });
  
  const selectListener1 = keys.num1.on('down', () => selectCharacter(0));
  const selectListener2 = keys.num2.on('down', () => selectCharacter(1));
  const selectListener3 = keys.num3.on('down', () => selectCharacter(2));
  const selectListener4 = keys.num4.on('down', () => selectCharacter(3));
  
  const selectCharacter = (index) => {
    keys.num1.off('down', selectListener1);
    keys.num2.off('down', selectListener2);
    keys.num3.off('down', selectListener3);
    keys.num4.off('down', selectListener4);
    
    gameState.selectedCharacter = charKeys[index];
    // AI picks a random different character
    const aiOptions = charKeys.filter(k => k !== gameState.selectedCharacter);
    gameState.aiCharacter = aiOptions[Math.floor(Math.random() * aiOptions.length)];
    
    menuBg.destroy();
    title.destroy();
    charTexts.forEach(ct => {
      ct.charBox.destroy();
      ct.text.destroy();
      ct.stats.destroy();
    });
    
    startNewGame.call(this);
  };
}

function startNewGame() {
  gameState.playerWins = 0;
  gameState.aiWins = 0;
  gameState.currentRound = 0;
  startNewRound.call(this);
}

function startNewRound() {
  gameState.currentRound++;
  gameState.scene = 'playing';
  gameState.roundTime = ROUND_TIME;
  
  // Clear projectiles and effects
  projectiles.clear(true, true);
  effects.clear(true, true);
  koEffect = null;
  
  // Reset special cooldowns
  playerLastSpecial = 0;
  aiLastSpecial = 0;
  
  // Create player
  const playerChar = CHARACTERS[gameState.selectedCharacter];
  player = createFighter.call(this, 150, GROUND_Y - 50, playerChar, true);
  
  // Create AI
  const aiChar = CHARACTERS[gameState.aiCharacter];
  ai = createFighter.call(this, GAME_WIDTH - 150, GROUND_Y - 50, aiChar, false);
  
  // Update UI
  updateHealthBars.call(this);
  updateStatsDisplay.call(this);
  
  // Round announcement
  const roundAnnounce = this.add.text(GAME_WIDTH / 2, GAME_HEIGHT / 2, `ROUND ${gameState.currentRound}`, {
    fontSize: '64px',
    fontWeight: 'bold',
    fill: '#ffcc00',
    stroke: '#000000',
    strokeThickness: 8
  }).setOrigin(0.5).setDepth(1000);
  
  this.time.delayedCall(1500, () => {
    roundAnnounce.setText('FIGHT!');
    this.time.delayedCall(800, () => roundAnnounce.destroy());
  });
}

function createFighter(x, y, charData, isPlayer) {
  const fighter = this.physics.add.sprite(x, y, null);
  
  // Create visual representation
  const graphics = this.add.graphics();
  graphics.fillStyle(charData.color, 1);
  
  // Body
  graphics.fillRect(-15, -25, 30, 50);
  
  // Head
  graphics.fillCircle(0, -40, 12);
  
  // Arms
  graphics.fillRect(-20, -15, 5, 25);
  graphics.fillRect(15, -15, 5, 25);
  
  // Legs
  graphics.fillRect(-12, 25, 8, 25);
  graphics.fillRect(4, 25, 8, 25);
  
  graphics.generateTexture('fighter_' + (isPlayer ? 'player' : 'ai'), 40, 90);
  graphics.destroy();
  
  fighter.setTexture('fighter_' + (isPlayer ? 'player' : 'ai'));
  fighter.setCollideWorldBounds(true);
  fighter.setBounce(0);
  
  this.physics.add.collider(fighter, platforms);
  
  // Custom properties
  fighter.charData = charData;
  fighter.health = charData.maxHealth;
  fighter.isPlayer = isPlayer;
  fighter.isAttacking = false;
  fighter.attackCooldown = 0;
  fighter.facingRight = isPlayer;
  fighter.isBlocking = false;
  fighter.hitStun = 0;
  
  // AI properties
  if (!isPlayer) {
    fighter.aiTimer = 0;
    fighter.aiAction = 'idle';
    fighter.aiCooldown = 0;
  }
  
  return fighter;
}

function update(time, delta) {
  if (gameState.scene === 'menu' || gameState.scene === 'characterSelect') {
    return;
  }
  
  if (gameState.scene === 'playing') {
    updatePlaying.call(this, time, delta);
  } else if (gameState.scene === 'roundEnd') {
    // Wait for next round or game over
    if (keys.enter.isDown) {
      if (gameState.playerWins === 2 || gameState.aiWins === 2) {
        endGame.call(this);
      } else {
        startNewRound.call(this);
      }
    }
  } else if (gameState.scene === 'gameOver') {
    if (keys.enter.isDown) {
      showMenu.call(this);
    }
  }
}

function updatePlaying(time, delta) {
  // Update round timer
  gameState.roundTime -= delta / 1000;
  if (gameState.roundTime <= 0) {
    gameState.roundTime = 0;
    // Time out - whoever has more health wins
    if (player.health > ai.health) {
      roundOver.call(this, true);
    } else if (ai.health > player.health) {
      roundOver.call(this, false);
    } else {
      // Draw - both lose health and continue
      player.health = Math.max(1, player.health - 10);
      ai.health = Math.max(1, ai.health - 10);
      updateHealthBars.call(this);
    }
  }
  roundText.setText(Math.ceil(gameState.roundTime));
  
  // Update attack cooldowns
  if (player.attackCooldown > 0) player.attackCooldown -= delta;
  if (ai.attackCooldown > 0) ai.attackCooldown -= delta;
  if (player.hitStun > 0) player.hitStun -= delta;
  if (ai.hitStun > 0) ai.hitStun -= delta;
  
  // Player controls
  if (!player.isAttacking && player.hitStun <= 0) {
    handlePlayerInput.call(this, time);
  } else {
    player.setVelocityX(0);
  }
  
  // AI behavior
  if (!ai.isAttacking && ai.hitStun <= 0) {
    handleAI.call(this, time, delta);
  } else {
    ai.setVelocityX(0);
  }
  
  // Update facing direction
  if (player.x < ai.x) {
    player.facingRight = true;
    player.setFlipX(false);
    ai.facingRight = false;
    ai.setFlipX(true);
  } else {
    player.facingRight = false;
    player.setFlipX(true);
    ai.facingRight = true;
    ai.setFlipX(false);
  }
  
  // Update projectiles
  projectiles.children.entries.forEach(proj => {
    if (proj.x < 0 || proj.x > GAME_WIDTH || proj.y < 0 || proj.y > GAME_HEIGHT) {
      proj.destroy();
    }
    
    // Check collision with fighters
    if (proj.owner !== player && Phaser.Geom.Intersects.RectangleToRectangle(proj.getBounds(), player.getBounds())) {
      hitFighter.call(this, player, proj.damage, 'special');
      createHitEffect.call(this, player.x, player.y - 30, 0xff6b6b);
      proj.destroy();
    } else if (proj.owner !== ai && Phaser.Geom.Intersects.RectangleToRectangle(proj.getBounds(), ai.getBounds())) {
      hitFighter.call(this, ai, proj.damage, 'special');
      createHitEffect.call(this, ai.x, ai.y - 30, 0xff6b6b);
      proj.destroy();
    }
  });
  
  // Update effects
  effects.children.entries.forEach(effect => {
    effect.alpha -= delta / 500;
    if (effect.alpha <= 0) {
      effect.destroy();
    }
  });
}

function handlePlayerInput(time) {
  const char = player.charData;
  
  // Movement
  if (cursors.left.isDown) {
    player.setVelocityX(-char.speed);
  } else if (cursors.right.isDown) {
    player.setVelocityX(char.speed);
  } else {
    player.setVelocityX(0);
  }
  
  // Jump
  if (cursors.up.isDown && player.body.touching.down) {
    player.setVelocityY(-char.jumpPower);
  }
  
  // Attacks
  if (keys.z.isDown && player.attackCooldown <= 0) {
    performAttack.call(this, player, 'punch', time);
  } else if (keys.x.isDown && player.attackCooldown <= 0) {
    performAttack.call(this, player, 'kick', time);
  } else if (keys.c.isDown && player.attackCooldown <= 0) {
    performSpecial.call(this, player, time);
  }
}

function handleAI(time, delta) {
  const char = ai.charData;
  const distance = Math.abs(player.x - ai.x);
  
  // Difficulty-based reaction time
  let reactionDelay = 500; // medium
  if (gameState.difficulty === 'easy') reactionDelay = 1000;
  if (gameState.difficulty === 'hard') reactionDelay = 200;
  
  ai.aiCooldown -= delta;
  
  if (ai.aiCooldown <= 0) {
    ai.aiCooldown = reactionDelay;
    
    // Decision making
    if (distance > 200) {
      // Move towards player
      ai.setVelocityX(ai.x < player.x ? char.speed * 0.7 : -char.speed * 0.7);
    } else if (distance > 100) {
      // In range for attacks
      const action = Math.random();
      if (action < 0.3 && ai.attackCooldown <= 0) {
        performAttack.call(this, ai, 'punch', time);
      } else if (action < 0.5 && ai.attackCooldown <= 0) {
        performAttack.call(this, ai, 'kick', time);
      } else if (action < 0.65 && time - aiLastSpecial > char.specialCooldown) {
        performSpecial.call(this, ai, time);
      } else {
        ai.setVelocityX(ai.x < player.x ? char.speed * 0.5 : -char.speed * 0.5);
      }
    } else {
      // Too close, back up or attack
      if (Math.random() < 0.6 && ai.attackCooldown <= 0) {
        performAttack.call(this, ai, Math.random() < 0.5 ? 'punch' : 'kick', time);
      } else {
        ai.setVelocityX(ai.x < player.x ? -char.speed * 0.8 : char.speed * 0.8);
      }
    }
    
    // Jump occasionally
    if (Math.random() < 0.15 && ai.body.touching.down) {
      ai.setVelocityY(-char.jumpPower);
    }
  }
}

function performAttack(fighter, type, time) {
  fighter.isAttacking = true;
  fighter.attackCooldown = 400;
  fighter.setVelocityX(0);
  
  const char = fighter.charData;
  const damage = type === 'punch' ? char.punchDamage : char.kickDamage;
  const range = type === 'punch' ? 60 : 80;
  
  // Visual attack effect
  const offsetX = fighter.facingRight ? 30 : -30;
  const attackEffect = this.add.rectangle(
    fighter.x + offsetX, 
    fighter.y - 20, 
    range, 
    30, 
    0xffcc00, 
    0.7
  );
  effects.add(attackEffect);
  
  // Check hit
  const opponent = fighter === player ? ai : player;
  const distance = Math.abs(fighter.x - opponent.x);
  
  if (distance < range + 20 && !opponent.isBlocking) {
    hitFighter.call(this, opponent, damage, type);
    createHitEffect.call(this, opponent.x, opponent.y - 30, 0xff6b6b);
  }
  
  this.time.delayedCall(300, () => {
    fighter.isAttacking = false;
  });
}

function performSpecial(fighter, time) {
  const char = fighter.charData;
  const cooldownKey = fighter === player ? 'playerLastSpecial' : 'aiLastSpecial';
  
  if (fighter === player && time - playerLastSpecial < char.specialCooldown) return;
  if (fighter === ai && time - aiLastSpecial < char.specialCooldown) return;
  
  if (fighter === player) playerLastSpecial = time;
  else aiLastSpecial = time;
  
  fighter.isAttacking = true;
  fighter.attackCooldown = 600;
  fighter.setVelocityX(0);
  
  if (char.special === 'fireball') {
    // Launch projectile
    const direction = fighter.facingRight ? 1 : -1;
    const projectile = this.physics.add.sprite(fighter.x + (direction * 40), fighter.y - 20, null);
    
    const graphics = this.add.graphics();
    graphics.fillStyle(0xff6600, 1);
    graphics.fillCircle(0, 0, 10);
    graphics.generateTexture('fireball', 20, 20);
    graphics.destroy();
    
    projectile.setTexture('fireball');
    projectile.setVelocityX(direction * 400);
    projectile.owner = fighter;
    projectile.damage = char.specialDamage;
    projectiles.add(projectile);
    
    createHitEffect.call(this, fighter.x + (direction * 20), fighter.y - 20, 0xff6600);
    
  } else if (char.special === 'dash') {
    // Dash attack
    const direction = fighter.facingRight ? 1 : -1;
    fighter.setVelocityX(direction * 600);
    
    createHitEffect.call(this, fighter.x, fighter.y, 0x58a6ff);
    
    // Check hit during dash
    this.time.delayedCall(200, () => {
      const opponent = fighter === player ? ai : player;
      const distance = Math.abs(fighter.x - opponent.x);
      if (distance < 80) {
        hitFighter.call(this, opponent, char.specialDamage, 'special');
        createHitEffect.call(this, opponent.x, opponent.y - 30, 0xff6b6b);
      }
      fighter.setVelocityX(0);
    });
    
  } else if (char.special === 'counter') {
    // Counter stance
    fighter.isBlocking = true;
    createHitEffect.call(this, fighter.x, fighter.y, 0xffcc00);
    
    this.time.delayedCall(800, () => {
      fighter.isBlocking = false;
    });
  }
  
  this.time.delayedCall(600, () => {
    fighter.isAttacking = false;
  });
}

function hitFighter(fighter, damage, type) {
  if (fighter.isBlocking && type !== 'special') {
    damage = Math.floor(damage * 0.3);
  }
  
  fighter.health -= damage;
  fighter.hitStun = 200;
  
  // Knockback
  const knockback = type === 'special' ? 150 : 100;
  const direction = fighter === player ? -1 : 1;
  fighter.setVelocityX(direction * knockback);
  
  // Flash effect
  fighter.setTint(0xff0000);
  this.time.delayedCall(100, () => fighter.clearTint());
  
  updateHealthBars.call(this);
  
  // Check KO
  if (fighter.health <= 0) {
    fighter.health = 0;
    roundOver.call(this, fighter === ai);
  }
}

function createHitEffect(x, y, color) {
  const effect = this.add.circle(x, y, 15, color, 0.8);
  effects.add(effect);
  
  this.tweens.add({
    targets: effect,
    scale: 2,
    alpha: 0,
    duration: 300,
    onComplete: () => effect.destroy()
  });
}

function roundOver(playerWon) {
  if (koEffect) return; // Prevent multiple calls
  koEffect = true;
  
  gameState.scene = 'roundEnd';
  
  if (playerWon) {
    gameState.playerWins++;
  } else {
    gameState.aiWins++;
  }
  
  // KO animation
  const loser = playerWon ? ai : player;
  loser.setVelocityX(0);
  loser.setTint(0x666666);
  
  this.tweens.add({
    targets: loser,
    angle: 90,
    y: GROUND_Y + 20,
    duration: 800,
    ease: 'Bounce.easeOut'
  });
  
  // Announcement
  const koText = this.add.text(GAME_WIDTH / 2, GAME_HEIGHT / 2 - 50, 'K.O.!', {
    fontSize: '72px',
    fontWeight: 'bold',
    fill: '#ff0000',
    stroke: '#000000',
    strokeThickness: 8
  }).setOrigin(0.5).setDepth(1000);
  
  const winnerText = this.add.text(GAME_WIDTH / 2, GAME_HEIGHT / 2 + 30, 
    playerWon ? 'PLAYER WINS!' : 'AI WINS!', {
    fontSize: '36px',
    fontWeight: 'bold',
    fill: playerWon ? '#00ff88' : '#ff6b6b',
    stroke: '#000000',
    strokeThickness: 6
  }).setOrigin(0.5).setDepth(1000);
  
  this.time.delayedCall(2500, () => {
    koText.destroy();
    winnerText.destroy();
    
    if (gameState.playerWins === 2 || gameState.aiWins === 2) {
      endGame.call(this);
    } else {
      const continueText = this.add.text(GAME_WIDTH / 2, GAME_HEIGHT / 2 + 80, 
        'Press ENTER for next round', {
        fontSize: '20px',
        fill: '#ffffff'
      }).setOrigin(0.5).setDepth(1000);
    }
  });
}

function endGame() {
  gameState.scene = 'gameOver';
  
  const playerWon = gameState.playerWins === 2;
  
  // Update stats
  if (playerWon) {
    gameState.stats.wins++;
    localStorage.setItem('ba_wins', gameState.stats.wins);
  } else {
    gameState.stats.losses++;
    localStorage.setItem('ba_losses', gameState.stats.losses);
  }
  
  // Clear fighters
  if (player) player.destroy();
  if (ai) ai.destroy();
  projectiles.clear(true, true);
  effects.clear(true, true);
  
  // Game over screen
  const menuBg = this.add.rectangle(GAME_WIDTH / 2, GAME_HEIGHT / 2 - 50, 600, 400, 0x14142a, 0.95);
  menuBg.setStrokeStyle(3, playerWon ? 0x00ff88 : 0xff6b6b);
  
  const title = this.add.text(GAME_WIDTH / 2, 180, playerWon ? 'VICTORY!' : 'DEFEAT', {
    fontSize: '64px',
    fontWeight: 'bold',
    fill: playerWon ? '#00ff88' : '#ff6b6b',
    stroke: '#000000',
    strokeThickness: 8
  }).setOrigin(0.5);
  
  const scoreText = this.add.text(GAME_WIDTH / 2, 260, 
    `Final Score: ${gameState.playerWins} - ${gameState.aiWins}`, {
    fontSize: '28px',
    fill: '#ffffff'
  }).setOrigin(0.5);
  
  const statsDisplay = this.add.text(GAME_WIDTH / 2, 320, 
    `Career Record: ${gameState.stats.wins}W - ${gameState.stats.losses}L`, {
    fontSize: '20px',
    fill: '#ffcc00'
  }).setOrigin(0.5);
  
  const continueText = this.add.text(GAME_WIDTH / 2, 380, 'Press ENTER to return to menu', {
    fontSize: '18px',
    fill: '#888888'
  }).setOrigin(0.5);
  
  updateStatsDisplay.call(this);
}

function updateHealthBars() {
  const playerPercent = player.health / player.charData.maxHealth;
  const aiPercent = ai.health / ai.charData.maxHealth;
  
  playerHealthBar.width = 250 * playerPercent;
  aiHealthBar.width = 250 * aiPercent;
  
  // Color coding
  if (playerPercent < 0.3) playerHealthBar.setFillStyle(0xff0000);
  else if (playerPercent < 0.6) playerHealthBar.setFillStyle(0xffcc00);
  else playerHealthBar.setFillStyle(0x00ff88);
  
  if (aiPercent < 0.3) aiHealthBar.setFillStyle(0xff0000);
  else if (aiPercent < 0.6) aiHealthBar.setFillStyle(0xffcc00);
  else aiHealthBar.setFillStyle(0xff6b6b);
}

function updateStatsDisplay() {
  statsText.setText(`Round ${gameState.currentRound}/3 | Player: ${gameState.playerWins} | AI: ${gameState.aiWins} | Record: ${gameState.stats.wins}W-${gameState.stats.losses}L`);
}

// Interstitial ad helper
function closeInterstitial() {
  document.getElementById('jb-interstitial').style.display = 'none';
}

// Show interstitial after game over (optional)
window.showInterstitialAd = function() {
  const interstitial = document.getElementById('jb-interstitial');
  const content = document.getElementById('jb-interstitial-content');
  content.innerHTML = '<p style="color:#fff;font-size:1.1rem;margin-bottom:12px;">Thanks for playing!</p><p style="color:#aaa;">Support us to unlock more fighters</p>';
  interstitial.style.display = 'flex';
};
</script>
