// UTIL Î“Ă‡Ă¶ rounded-rectangle path helper

function rrect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x,     y + h, x, y + h - r,     r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x,     y,     x + r, y,         r);
  ctx.closePath();
}

  // Viewport minus top-ad-banner height (90px) that monetization.js injects
  const availW = Math.min(window.innerWidth, 520);
  const availH = window.innerHeight - 90;

  const cellFromW = Math.floor((availW - PAD * 2) / GRID_COLS);
  const cellFromH = Math.floor(
    (availH - HEADER_H - TRAY_MIN_H - PAD * 4) / GRID_ROWS
  );

  CELL = Math.min(cellFromW, cellFromH);
  CELL = Math.max(CELL, 22);
  CELL = Math.min(CELL, 48);

  const boardPx = CELL * GRID_COLS;
  TRAY_H = Math.max(TRAY_MIN_H, CELL * 3 + PAD * 2);

  canvas.width  = boardPx + PAD * 2;
  canvas.height = HEADER_H + PAD + CELL * GRID_ROWS + PAD + TRAY_H + PAD;

  BOARD_X = PAD;
  BOARD_Y = HEADER_H + PAD;
  TRAY_Y  = BOARD_Y + CELL * GRID_ROWS + PAD;
}

// =====================================================================
// PIECE HELPERS
// =====================================================================

/** Bounding box of a piece's cells (normalised coords). */
function pieceBounds(piece) {
  let minR = Infinity, maxR = -Infinity;
  let minC = Infinity, maxC = -Infinity;
  for (const [r, c] of piece.cells) {
    if (r < minR) minR = r;  if (r > maxR) maxR = r;
    if (c < minC) minC = c;  if (c > maxC) maxC = c;
  }
  return { minR, maxR, minC, maxC,
           rows: maxR - minR + 1, cols: maxC - minC + 1 };
}

// =====================================================================
// generatePiece() Î“Ă‡Ă¶ pick a random shape, clone its cells
// =====================================================================
function generatePiece() {
  const def = PIECE_DEFS[Math.floor(Math.random() * PIECE_DEFS.length)];
  return { cells: def.cells.map(([r, c]) => [r, c]), color: def.color };
}

// =====================================================================
// canPlace(piece, row, col)
// True if every cell (row+dr, col+dc) is in-bounds and empty.
// =====================================================================
function canPlace(piece, row, col) {
  for (const [dr, dc] of piece.cells) {
    const r = row + dr;
    const c = col + dc;
    if (r < 0 || r >= GRID_ROWS) return false;
    if (c < 0 || c >= GRID_COLS) return false;
    if (grid[r][c] !== 0)        return false;
  }
  return true;
}

// =====================================================================
// placePiece(slot, anchorRow, anchorCol)
// Stamps the tray piece onto the grid at the given anchor, triggers clears.
// =====================================================================
function placePiece(slot, anchorRow, anchorCol) {
  const piece = tray[slot];
  if (!piece)                             return false;
  if (!canPlace(piece, anchorRow, anchorCol)) return false;

  // Stamp cells
  for (const [dr, dc] of piece.cells) {
    grid[anchorRow + dr][anchorCol + dc] = piece.color + 1;
  }

  // +1 per cell placed
  const placePts = piece.cells.length;
  addScore(placePts);
  spawnPop(
    BOARD_X + (anchorCol + (pieceBounds(piece).cols - 1) / 2) * CELL,
    BOARD_Y + anchorRow * CELL - 4,
    '+' + placePts
  );

  // Remove from tray; refill all when all 3 are used
  tray[slot] = null;
  if (tray.every(p => p === null)) {
    tray[0] = generatePiece();
    tray[1] = generatePiece();
    tray[2] = generatePiece();
  }

  selectedSlot = null;
  hasGhost     = false;
  isDragging   = false;
  dragSlot     = -1;

  // Check line clears, then check game-over
  checkClears(() => {
    if (checkGameOver()) {
      triggerGameOver();
    } else {
      renderAll();
    }
  });

  return true;
}

// =====================================================================
// checkClears()
// Detects full rows / columns, starts flashÎ“ĂĄĂ†fade animation, adds score.
// =====================================================================
function checkClears(callback) {
  const rowsToClear = [];
  const colsToClear = [];

  for (let r = 0; r < GRID_ROWS; r++) {
    if (grid[r].every(v => v !== 0)) rowsToClear.push(r);
  }
  for (let c = 0; c < GRID_COLS; c++) {
    let full = true;
    for (let r = 0; r < GRID_ROWS; r++) { if (grid[r][c] === 0) { full = false; break; } }
    if (full) colsToClear.push(c);
  }

  if (rowsToClear.length === 0 && colsToClear.length === 0) {
    renderAll();
    if (callback) callback();
    return;
  }

  // Score: 10 â”śĂą cells per line â”śĂą combo multiplier
  const totalLines = rowsToClear.length + colsToClear.length;
  let pts = 0;
  rowsToClear.forEach(() => { pts += GRID_COLS * 10; });
  colsToClear.forEach(() => { pts += GRID_ROWS * 10; });
  pts *= totalLines;

  // Combo banner
  if (totalLines > 1) {
    comboText = 'COMBO â”śĂą' + totalLines + '!';
    if (comboFadeId) clearTimeout(comboFadeId);
    comboFadeId = setTimeout(() => { comboText = ''; renderAll(); }, 1600);
  }

  // Score pop centred on cleared region
  const midRow = rowsToClear.length
    ? rowsToClear[Math.floor(rowsToClear.length / 2)]
    : Math.floor(GRID_ROWS / 2);
  const midCol = colsToClear.length
    ? colsToClear[Math.floor(colsToClear.length / 2)]
    : Math.floor(GRID_COLS / 2);
  spawnPop(
    BOARD_X + midCol * CELL + CELL / 2,
    BOARD_Y + midRow * CELL,
    '+' + pts + (totalLines > 1 ? ' â”śĂą' + totalLines : '')
  );

  // Start animation
  animRows       = new Set(rowsToClear);
  animCols       = new Set(colsToClear);
  animPendingPts = pts;
  animPhase      = 'flash';
  animTick       = 0;

  animDoneCB = () => {
    for (const r of animRows) { for (let c = 0; c < GRID_COLS; c++) grid[r][c] = 0; }
    for (const col of animCols) { for (let r = 0; r < GRID_ROWS; r++) grid[r][col] = 0; }
    addScore(animPendingPts);
    animRows  = new Set();
    animCols  = new Set();
    animPhase = 'idle';
    if (callback) callback();
  };

  requestAnimationFrame(doAnimFrame);
}

/** Single animation frame step for line-clear flash Î“ĂĄĂ† fade. */
function doAnimFrame() {
  animTick++;
  if (animPhase === 'flash' && animTick >= FLASH_FRAMES) animPhase = 'fade';

  renderAll();

  if (animTick >= FLASH_FRAMES + FADE_FRAMES) {
    const cb = animDoneCB;
    animDoneCB = null;
    if (cb) cb();
    return;
  }
  requestAnimationFrame(doAnimFrame);
}

// =====================================================================
// checkGameOver()
// Returns true when no remaining tray piece can fit anywhere on the grid.
// =====================================================================
function checkGameOver() {
  const live = tray.filter(p => p !== null);
  if (live.length === 0) return false;

  for (const piece of live) {
    for (let r = 0; r < GRID_ROWS; r++) {
      for (let c = 0; c < GRID_COLS; c++) {
        if (canPlace(piece, r, c)) return false;
      }
    }
  }
  return true;
}

// =====================================================================
// SCORE helpers
// =====================================================================
function addScore(pts) {
  score += pts;
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('blockstorm_best', String(bestScore));
  }
}

// =====================================================================
// SCORE-POP (flying "+N" text)
// =====================================================================
function spawnPop(x, y, text) {
  if (!pops) pops = [];
  pops.push({ x, y, text, alpha: 1, dy: -1.4 });
  if (!popLoopActive) { popLoopActive = true; requestAnimationFrame(popFrame); }
}
let popLoopActive = false;
function popFrame() {
  pops = pops.filter(p => p.alpha > 0.02);
  pops.forEach(p => { p.y += p.dy; p.alpha -= 0.025; });
  renderAll();
  if (pops.length > 0) { requestAnimationFrame(popFrame); }
  else { popLoopActive = false; }
}

// =====================================================================
// TRIGGER GAME OVER
// =====================================================================
function triggerGameOver() {
  isGameOver = true;
  gameOverCount++;
  renderAll();

  // Update DOM overlay
  document.getElementById('go-score').textContent = 'Score: ' + score;
  document.getElementById('go-best').textContent  = 'Best: '  + bestScore;
  document.getElementById('game-over').classList.add('visible');

  // Interstitial every 5 game-overs
  if (gameOverCount % 5 === 0) {
    setTimeout(showInterstitial, 600);
  }

  // Auto-trigger share after a delay
  setTimeout(() => {
    if (typeof window.jbShareScore === 'function') window.jbShareScore(score);
  }, 1800);
}

// =====================================================================
// INTERSTITIAL AD logic
// =====================================================================
function showInterstitial() {
  const el = document.getElementById('jb-interstitial');
  if (!el) return;
  el.style.display = 'flex';
  const closeBtn = document.getElementById('jb-inter-close');
  const timerEl  = document.getElementById('jb-inter-timer');
  if (closeBtn) { closeBtn.style.opacity = '0'; closeBtn.style.pointerEvents = 'none'; }
  let t = 4;
  if (timerEl) timerEl.textContent = 'Continue in ' + t + 'sÎ“Ă‡ÂŞ';
  const iv = setInterval(() => {
    t--;
    if (t <= 0) {
      clearInterval(iv);
      if (timerEl)  timerEl.textContent = '';
      if (closeBtn) { closeBtn.style.opacity = '1'; closeBtn.style.pointerEvents = 'auto'; }
    } else {
      if (timerEl) timerEl.textContent = 'Continue in ' + t + 'sÎ“Ă‡ÂŞ';
    }
  }, 1000);
}
document.getElementById('jb-inter-close').addEventListener('click', () => {
  document.getElementById('jb-interstitial').style.display = 'none';
});

// =====================================================================
// INIT / RESTART
// =====================================================================
function initGame() {
  grid = Array.from({ length: GRID_ROWS }, () => new Array(GRID_COLS).fill(0));
  tray = [generatePiece(), generatePiece(), generatePiece()];

  score        = 0;
  bestScore    = parseInt(localStorage.getItem('blockstorm_best') || '0');
  selectedSlot = null;
  ghostRow = ghostCol = -1;
  hasGhost  = false;
  isGameOver = false;

  animPhase = 'idle';
  animRows  = new Set();
  animCols  = new Set();

  isDragging = false;
  dragSlot   = -1;
  comboText  = '';
  pops       = [];

  document.getElementById('game-over').classList.remove('visible');
  computeLayout();
  renderAll();
}

// =====================================================================
// RENDERING Î“Ă‡Ă¶ master call
// =====================================================================
function renderAll() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  renderHeader();
  renderBoard();
  renderTray();

  // Dragged piece floats above everything
  if (isDragging && dragSlot >= 0 && tray[dragSlot]) renderDragPiece();

  // Combo banner
  if (comboText) renderComboText();

  // Score pops
  if (pops && pops.length) renderPops();
}

// Î“Ă¶Ă‡Î“Ă¶Ă‡ Header Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡
function renderHeader() {

}

// Î“Ă¶Ă‡Î“Ă¶Ă‡ Board Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡
function renderBoard() {
  const bw = CELL * GRID_COLS;
  const bh = CELL * GRID_ROWS;

  // Outer border / shadow
  ctx.fillStyle = '#1a2235';
  ctx.fillRect(BOARD_X - 2, BOARD_Y - 2, bw + 4, bh + 4);

  for (let r = 0; r < GRID_ROWS; r++) {
    for (let c = 0; c < GRID_COLS; c++) {
      const px  = BOARD_X + c * CELL;
      const py  = BOARD_Y + r * CELL;
      const val = grid[r][c];

      const clearing = animRows.has(r) || animCols.has(c);

      if (val === 0) {
        // Empty cell
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);
        // Subtle dot
        ctx.fillStyle = '#26264a';
        const ds = Math.max(1, Math.floor(CELL / 12));
        ctx.fillRect(px + CELL / 2 - ds / 2, py + CELL / 2 - ds / 2, ds, ds);
      } else {
        const baseColor = COLORS[val - 1];
        let alpha    = 1;
        let useWhite = false;

        if (clearing && animPhase !== 'idle') {
          if (animPhase === 'flash') {
            useWhite = Math.floor((animTick / FLASH_FRAMES) * 6) % 2 === 0;
          } else {
            alpha = Math.max(0, 1 - (animTick - FLASH_FRAMES) / FADE_FRAMES);
          }
        }

        ctx.globalAlpha = alpha;
        ctx.fillStyle   = useWhite ? '#ffffff' : baseColor;
        ctx.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);

        if (!useWhite) {
          // Highlight shine at top edge
          ctx.fillStyle = 'rgba(255,255,255,0.22)';
          ctx.fillRect(px + 2, py + 2, CELL - 4, Math.max(2, Math.floor((CELL - 4) / 3)));
          // Dark shadow at bottom edge
          ctx.fillStyle = 'rgba(0,0,0,0.18)';
          const sh = Math.max(2, Math.floor((CELL - 4) / 4));
          ctx.fillRect(px + 2, py + CELL - 2 - sh, CELL - 4, sh);
        }
        ctx.globalAlpha = 1;
      }
    }
  }

  // Ghost overlay (only when animation is idle)
  if (hasGhost && selectedSlot !== null && tray[selectedSlot] &&
      !isGameOver && animPhase === 'idle') {
    const piece   = tray[selectedSlot];
    const valid   = canPlace(piece, ghostRow, ghostCol);
    ctx.globalAlpha = valid ? GHOST_ALPHA : 0.18;
    ctx.fillStyle   = valid ? COLORS[piece.color] : '#ff4444';

    for (const [dr, dc] of piece.cells) {
      const gr = ghostRow + dr;
      const gc = ghostCol + dc;
      if (gr >= 0 && gr < GRID_ROWS && gc >= 0 && gc < GRID_COLS) {
        ctx.fillRect(BOARD_X + gc * CELL + 1, BOARD_Y + gr * CELL + 1,
                     CELL - 2, CELL - 2);
      }
    }
    ctx.globalAlpha = 1;
  }
}

// Î“Ă¶Ă‡Î“Ă¶Ă‡ Tray Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡
function renderTray() {
  const slotW = canvas.width / TRAY_SLOTS;

  // Tray background
  ctx.fillStyle = '#080c14';
  ctx.fillRect(0, TRAY_Y, canvas.width, TRAY_H + PAD);

  ctx.fillStyle = '#1a2235';
  ctx.fillRect(0, TRAY_Y, canvas.width, 1);

  for (let i = 0; i < TRAY_SLOTS; i++) {
    const sx      = i * slotW;
    const piece   = tray[i];
    const isSel   = selectedSlot === i;
    const isDrag  = isDragging && dragSlot === i;

    // Slot background
    ctx.fillStyle = isSel ? '#14203a' : '#0d1220';
    rrect(sx + 5, TRAY_Y + 5, slotW - 10, TRAY_H - 10, 10);
    ctx.fill();

    // Slot border
    ctx.lineWidth = isSel ? 2 : 1;
    ctx.strokeStyle = isSel && piece ? COLORS[piece.color] : '#1e2d44';
    rrect(sx + 5, TRAY_Y + 5, slotW - 10, TRAY_H - 10, 10);
    ctx.stroke();

    if (!piece) {
      // Used-slot checkmark
      ctx.fillStyle    = '#2e3a55';
      ctx.font         = 'bold 16px sans-serif';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Î“ÂŁĂ´', sx + slotW / 2, TRAY_Y + TRAY_H / 2);
      ctx.textAlign    = 'left';
      ctx.textBaseline = 'alphabetic';
      continue;
    }

    // Fade piece in tray when it is being dragged
    if (isDrag) ctx.globalAlpha = 0.25;

    // Scale piece to fill slot nicely (never upscale beyond CELL size)
    const b      = pieceBounds(piece);
    const innerW = slotW - 26;
    const innerH = TRAY_H - 26;
    const pxW    = b.cols * CELL;
    const pxH    = b.rows * CELL;
    const scale  = Math.min(innerW / pxW, innerH / pxH, 1.15);
    const sc     = Math.max(Math.floor(CELL * scale), 10);

    const tw = b.cols * sc;
    const th = b.rows * sc;
    const ox = sx + (slotW - tw) / 2 - b.minC * sc;
    const oy = TRAY_Y + (TRAY_H - th) / 2 - b.minR * sc;

    for (const [r, c] of piece.cells) {
      const px = ox + c * sc;
      const py = oy + r * sc;
      ctx.fillStyle = COLORS[piece.color];
      ctx.fillRect(px + 1, py + 1, sc - 2, sc - 2);
      // Shine
      ctx.fillStyle = 'rgba(255,255,255,0.22)';
      ctx.fillRect(px + 2, py + 2, sc - 4, Math.max(2, Math.floor((sc - 4) / 3)));
    }
    ctx.globalAlpha = 1;
  }
}

// Î“Ă¶Ă‡Î“Ă¶Ă‡ Dragged piece floating under pointer Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡
function renderDragPiece() {
  const piece = tray[dragSlot];
  if (!piece) return;
  const b  = pieceBounds(piece);
  const sc = CELL;
  const tw = b.cols * sc;
  const th = b.rows * sc;
  const ox = pointerX - tw / 2 - b.minC * sc;
  const oy = pointerY - th / 2 - b.minR * sc;

  ctx.globalAlpha = 0.88;
  for (const [r, c] of piece.cells) {
    const px = ox + c * sc;
    const py = oy + r * sc;
    ctx.fillStyle = COLORS[piece.color];
    ctx.fillRect(px + 1, py + 1, sc - 2, sc - 2);
    ctx.fillStyle = 'rgba(255,255,255,0.28)';
    ctx.fillRect(px + 2, py + 2, sc - 4, Math.max(2, Math.floor((sc - 4) / 3)));
  }
  ctx.globalAlpha = 1;
}

// Î“Ă¶Ă‡Î“Ă¶Ă‡ Combo banner Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡
function renderComboText() {
  const cx = canvas.width  / 2;
  const cy = BOARD_Y + CELL * GRID_ROWS / 2;

  ctx.save();
  ctx.font      = 'bold 30px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Drop shadow
  ctx.globalAlpha = 0.75;
  ctx.fillStyle   = 'rgba(0,0,0,0.9)';
  ctx.fillText(comboText, cx + 2, cy + 2);

  ctx.globalAlpha = 1;
  const cg = ctx.createLinearGradient(cx - 100, cy, cx + 100, cy);
  cg.addColorStop(0, '#ffd700');
  cg.addColorStop(1, '#ff69b4');
  ctx.fillStyle = cg;
  ctx.fillText(comboText, cx, cy);

  ctx.restore();
}

// Î“Ă¶Ă‡Î“Ă¶Ă‡ Score pops Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡
function renderPops() {
  ctx.save();
  ctx.font         = 'bold 14px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  for (const p of pops) {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle   = '#ffd700';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// =====================================================================
// GHOST POSITIONING
// Centres the piece's bounding box on the pointer.
// =====================================================================
function computeGhost(piece, px, py) {
  const b = pieceBounds(piece);

  // Grid row/col under pointer (fractional)
  const gridR = (py - BOARD_Y) / CELL;
  const gridC = (px - BOARD_X) / CELL;

  // Anchor of bounding-box top-left, clamped to keep piece inside grid
  let bbR = Math.round(gridR - (b.rows - 1) / 2);
  let bbC = Math.round(gridC - (b.cols - 1) / 2);
  bbR = Math.max(0, Math.min(bbR, GRID_ROWS - b.rows));
  bbC = Math.max(0, Math.min(bbC, GRID_COLS - b.cols));

  // Convert from bounding-box top-left to piece anchor
  ghostRow = bbR - b.minR;
  ghostCol = bbC - b.minC;
  hasGhost = true;
}

// =====================================================================
// COORDINATE HELPERS
// =====================================================================
function getCanvasPos(e) {
  const rect   = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  let cx, cy;
  if (e.touches || e.changedTouches) {
    const t = e.touches ? e.touches[0] : e.changedTouches[0];
    cx = t.clientX; cy = t.clientY;
  } else {
    cx = e.clientX; cy = e.clientY;
  }
  return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
}

function getTraySlot(x, y) {
  if (y < TRAY_Y || y > TRAY_Y + TRAY_H) return -1;
  const slot = Math.floor(x / (canvas.width / TRAY_SLOTS));
  return (slot >= 0 && slot < TRAY_SLOTS) ? slot : -1;
}

function isOverBoard(x, y) {
  return x >= BOARD_X && x < BOARD_X + CELL * GRID_COLS &&
         y >= BOARD_Y && y < BOARD_Y + CELL * GRID_ROWS;
}

// =====================================================================
// UNIFIED INPUT HANDLERS
// =====================================================================
function onDown(x, y) {
  if (isGameOver || animPhase !== 'idle') return;

  const slot = getTraySlot(x, y);
  if (slot >= 0 && tray[slot]) {
    // Start drag from tray
    isDragging   = true;
    dragSlot     = slot;
    selectedSlot = slot;
    pointerX     = x;
    pointerY     = y;
    computeGhost(tray[slot], x, y);
    renderAll();
    return;
  }

  // Tap on board while a piece is selected Î“ĂĄĂ† place it
  if (isOverBoard(x, y) && selectedSlot !== null && tray[selectedSlot]) {
    computeGhost(tray[selectedSlot], x, y);
    if (canPlace(tray[selectedSlot], ghostRow, ghostCol)) {
      placePiece(selectedSlot, ghostRow, ghostCol);
    } else {
      renderAll(); // show red ghost briefly
    }
    return;
  }

  // Tap elsewhere: deselect
  if (getTraySlot(x, y) < 0) {
    selectedSlot = null;
    hasGhost     = false;
    renderAll();
  }
}

function onMove(x, y) {
  if (isGameOver) return;
  pointerX = x;
  pointerY = y;

  const activePiece = isDragging && dragSlot >= 0 ? tray[dragSlot]
                    : selectedSlot !== null       ? tray[selectedSlot]
                    : null;

  if (activePiece) {
    if (isOverBoard(x, y)) {
      computeGhost(activePiece, x, y);
    } else {
      hasGhost = false;
    }
    renderAll();
  }
}

function onUp(x, y) {
  if (isGameOver) return;

  if (isDragging && dragSlot >= 0 && tray[dragSlot]) {
    if (isOverBoard(x, y) && hasGhost) {
      const slot = dragSlot;
      isDragging = false;
      dragSlot   = -1;
      if (!placePiece(slot, ghostRow, ghostCol)) {
        // Invalid spot Î“Ă‡Ă¶ keep piece selected so player can try again
        selectedSlot = slot;
        isDragging   = false;
        dragSlot     = -1;
        renderAll();
      }
    } else {
      // Dropped off-board: treat as tap-to-select
      selectedSlot = dragSlot;
      isDragging   = false;
      dragSlot     = -1;
      hasGhost     = false;
      renderAll();
    }
  }
}

// Î“Ă¶Ă‡Î“Ă¶Ă‡ Mouse Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡
canvas.addEventListener('mousedown',  e => { e.preventDefault(); const p = getCanvasPos(e); onDown(p.x, p.y); });
canvas.addEventListener('mousemove',  e => { const p = getCanvasPos(e); onMove(p.x, p.y); });
canvas.addEventListener('mouseup',    e => { const p = getCanvasPos(e); onUp(p.x, p.y); });
canvas.addEventListener('mouseleave', () => {
  if (isDragging) { isDragging = false; dragSlot = -1; hasGhost = false; renderAll(); }
});

// Î“Ă¶Ă‡Î“Ă¶Ă‡ Touch Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡
canvas.addEventListener('touchstart', e => { e.preventDefault(); const p = getCanvasPos(e); onDown(p.x, p.y); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); const p = getCanvasPos(e); onMove(p.x, p.y); }, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); const p = getCanvasPos(e); onUp(p.x, p.y);  }, { passive: false });

// Î“Ă¶Ă‡Î“Ă¶Ă‡ DOM buttons Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡Î“Ă¶Ă‡
document.getElementById('go-play-btn').addEventListener('click', initGame);
document.getElementById('go-share-btn').addEventListener('click', () => {
  if (typeof window.jbShareScore === 'function') window.jbShareScore(score);
});
document.getElementById('jb-bar-share').addEventListener('click', e => {
  e.preventDefault();
  if (typeof window.jbShareScore === 'function') window.jbShareScore(score);
});

window.addEventListener('resize', () => {
  if (!isGameOver) { computeLayout(); renderAll(); }
});

gameOverCount = 0;

</script>
