<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Asteroid Dash — JellyBolt Games</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; touch-action: none; user-select: none; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const STATE = { MENU: 0, PLAYING: 1, DEAD: 2 };
let state = STATE.MENU;

let ship, bullets, asteroids, explosions, stars, powerups;
let score, highScore, lives, level, shieldTimer, rapidTimer, frameCount;
let keys = {};

highScore = parseInt(localStorage.getItem('ad_high') || '0');

function init() {
  ship = { x: W / 2, y: H - 80, w: 30, h: 35, speed: 6, cooldown: 0, thrust: false };
  bullets = [];
  asteroids = [];
  explosions = [];
  powerups = [];
  score = 0;
  lives = 3;
  level = 1;
  shieldTimer = 0;
  rapidTimer = 0;
  frameCount = 0;
  initStars();
}

function initStars() {
  stars = [];
  for (let i = 0; i < 100; i++) {
    stars.push({
      x: Math.random() * W, y: Math.random() * H,
      speed: 0.5 + Math.random() * 2, size: Math.random() * 2,
      brightness: 0.3 + Math.random() * 0.7
    });
  }
}
initStars();

// Input
window.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key] = false; });

let touchX = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === STATE.MENU) { state = STATE.PLAYING; init(); return; }
  if (state === STATE.DEAD) { state = STATE.MENU; return; }
  touchX = e.touches[0].clientX;
  shoot();
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (state !== STATE.PLAYING) return;
  const newX = e.touches[0].clientX;
  ship.x += (newX - touchX) * 1.5;
  touchX = newX;
  ship.x = Math.max(ship.w / 2, Math.min(W - ship.w / 2, ship.x));
}, { passive: false });
canvas.addEventListener('touchend', e => { touchX = null; });

canvas.addEventListener('click', () => {
  if (state === STATE.MENU) { state = STATE.PLAYING; init(); }
  else if (state === STATE.DEAD) state = STATE.MENU;
});

function shoot() {
  if (ship.cooldown > 0) return;
  const cd = rapidTimer > 0 ? 5 : 12;
  ship.cooldown = cd;
  bullets.push({ x: ship.x, y: ship.y - ship.h / 2, vy: -10, color: '#00ff88' });
  if (rapidTimer > 0) {
    bullets.push({ x: ship.x - 10, y: ship.y - ship.h / 2 + 5, vy: -10, color: '#58a6ff' });
    bullets.push({ x: ship.x + 10, y: ship.y - ship.h / 2 + 5, vy: -10, color: '#58a6ff' });
  }
}

function spawnAsteroid() {
  const size = 15 + Math.random() * 30;
  asteroids.push({
    x: Math.random() * W, y: -size,
    vx: (Math.random() - 0.5) * 2, vy: 1.5 + Math.random() * (1 + level * 0.3),
    size, hp: Math.ceil(size / 15), rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.05,
    color: ['#8b949e', '#6e7681', '#484f58', '#a0a0a0'][Math.floor(Math.random() * 4)]
  });
}

function spawnPowerup(x, y) {
  if (Math.random() > 0.15) return;
  const types = ['shield', 'rapid', 'life'];
  const type = types[Math.floor(Math.random() * types.length)];
  const colors = { shield: '#58a6ff', rapid: '#ffcc00', life: '#ff6b6b' };
  const icons = { shield: '🛡️', rapid: '⚡', life: '❤️' };
  powerups.push({ x, y, vy: 1.5, type, color: colors[type], icon: icons[type], size: 12 });
}

function update() {
  if (state !== STATE.PLAYING) return;
  frameCount++;

  // Ship movement
  if (keys['ArrowLeft'] || keys['a']) ship.x -= ship.speed;
  if (keys['ArrowRight'] || keys['d']) ship.x += ship.speed;
  if (keys['ArrowUp'] || keys['w']) ship.y -= ship.speed * 0.7;
  if (keys['ArrowDown'] || keys['s']) ship.y += ship.speed * 0.7;
  ship.x = Math.max(ship.w / 2, Math.min(W - ship.w / 2, ship.x));
  ship.y = Math.max(ship.h, Math.min(H - 20, ship.y));

  // Auto-fire
  if (keys[' '] || keys['ArrowUp'] || touchX !== null) shoot();
  if (ship.cooldown > 0) ship.cooldown--;

  // Timers
  if (shieldTimer > 0) shieldTimer--;
  if (rapidTimer > 0) rapidTimer--;

  // Level progression
  if (frameCount % 600 === 0) level++;
  // Spawn rate
  const spawnRate = Math.max(15, 40 - level * 2);
  if (frameCount % spawnRate === 0) spawnAsteroid();

  // Update bullets
  bullets.forEach(b => b.y += b.vy);
  bullets = bullets.filter(b => b.y > -10);

  // Update asteroids
  asteroids.forEach(a => {
    a.x += a.vx; a.y += a.vy;
    a.rotation += a.rotSpeed;
  });
  asteroids = asteroids.filter(a => a.y < H + 50 && a.x > -50 && a.x < W + 50);

  // Update powerups
  powerups.forEach(p => p.y += p.vy);
  powerups = powerups.filter(p => p.y < H + 20);

  // Bullet-asteroid collisions
  bullets.forEach(b => {
    asteroids.forEach(a => {
      const dx = b.x - a.x, dy = b.y - a.y;
      if (Math.sqrt(dx * dx + dy * dy) < a.size) {
        a.hp--;
        b.y = -100; // remove bullet
        if (a.hp <= 0) {
          score += Math.ceil(a.size);
          explode(a.x, a.y, a.size, a.color);
          spawnPowerup(a.x, a.y);
          a.y = H + 100; // remove asteroid
        } else {
          // Hit sparks
          for (let i = 0; i < 3; i++) {
            explosions.push({
              x: b.x, y: b.y, vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4,
              life: 0.5, color: '#ffcc00', size: 2
            });
          }
        }
      }
    });
  });

  // Ship-asteroid collisions
  asteroids.forEach(a => {
    const dx = ship.x - a.x, dy = ship.y - a.y;
    if (Math.sqrt(dx * dx + dy * dy) < a.size + ship.w / 2) {
      if (shieldTimer > 0) {
        explode(a.x, a.y, a.size, '#58a6ff');
        a.y = H + 100;
        shieldTimer = Math.max(0, shieldTimer - 30);
      } else {
        lives--;
        explode(ship.x, ship.y, 20, '#ff6b6b');
        a.y = H + 100;
        if (lives <= 0) {
          state = STATE.DEAD;
          if (score > highScore) { highScore = score; localStorage.setItem('ad_high', highScore.toString()); }
        } else {
          shieldTimer = 60; // brief invulnerability
        }
      }
    }
  });

  // Ship-powerup collisions
  powerups.forEach(p => {
    const dx = ship.x - p.x, dy = ship.y - p.y;
    if (Math.sqrt(dx * dx + dy * dy) < p.size + ship.w / 2) {
      if (p.type === 'shield') shieldTimer = 300;
      else if (p.type === 'rapid') rapidTimer = 300;
      else if (p.type === 'life') lives = Math.min(5, lives + 1);
      explode(p.x, p.y, 10, p.color);
      p.y = H + 100;
    }
  });

  // Update explosions
  explosions.forEach(e => { e.x += e.vx; e.y += e.vy; e.life -= 0.02; });
  explosions = explosions.filter(e => e.life > 0);

  // Stars
  stars.forEach(s => { s.y += s.speed; if (s.y > H) { s.y = 0; s.x = Math.random() * W; } });
}

function explode(x, y, size, color) {
  for (let i = 0; i < size; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    explosions.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: 0.5 + Math.random() * 0.5, color, size: 2 + Math.random() * 3
    });
  }
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    ctx.fillStyle = `rgba(255,255,255,${s.brightness})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  });

  if (state === STATE.MENU) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff6b6b';
    ctx.shadowColor = '#ff6b6b';
    ctx.shadowBlur = 30;
    ctx.font = 'bold 52px system-ui';
    ctx.fillText('ASTEROID DASH', W / 2, H / 2 - 80);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#58a6ff';
    ctx.font = '20px system-ui';
    ctx.fillText('Arrow Keys / WASD to move • Space to shoot', W / 2, H / 2 - 30);
    ctx.fillText('On mobile: Touch to shoot, drag to move', W / 2, H / 2);
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 28px system-ui';
    ctx.fillText('CLICK OR TAP TO START', W / 2, H / 2 + 50);
    ctx.fillStyle = '#8b949e';
    ctx.font = '16px system-ui';
    ctx.fillText(`High Score: ${highScore}`, W / 2, H / 2 + 90);
    ctx.fillStyle = '#484f58';
    ctx.font = '14px system-ui';
    ctx.fillText('⚡ JellyBolt Games', W / 2, H - 30);
    return;
  }

  // Bullets
  bullets.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 8;
    ctx.fillRect(b.x - 2, b.y - 6, 4, 12);
  });
  ctx.shadowBlur = 0;

  // Asteroids
  asteroids.forEach(a => {
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.rotation);
    ctx.fillStyle = a.color;
    ctx.beginPath();
    // Irregular polygon
    for (let i = 0; i < 7; i++) {
      const angle = (i / 7) * Math.PI * 2;
      const r = a.size * (0.7 + Math.sin(i * 2.5) * 0.3);
      if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
      else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
    }
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  });

  // Powerups
  powerups.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.font = '14px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(p.icon, p.x, p.y + 5);
  });

  // Ship
  ctx.save();
  ctx.translate(ship.x, ship.y);
  // Shield visual
  if (shieldTimer > 0) {
    ctx.strokeStyle = `rgba(88,166,255,${0.3 + Math.sin(Date.now() * 0.01) * 0.2})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, ship.w, 0, Math.PI * 2);
    ctx.stroke();
  }
  // Ship body
  ctx.fillStyle = '#00ff88';
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.moveTo(0, -ship.h / 2);
  ctx.lineTo(-ship.w / 2, ship.h / 2);
  ctx.lineTo(-ship.w / 4, ship.h / 3);
  ctx.lineTo(ship.w / 4, ship.h / 3);
  ctx.lineTo(ship.w / 2, ship.h / 2);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
  // Thrust
  if (keys['ArrowUp'] || keys['w'] || touchX !== null) {
    ctx.fillStyle = '#ff9f43';
    ctx.beginPath();
    ctx.moveTo(-6, ship.h / 3);
    ctx.lineTo(0, ship.h / 2 + 10 + Math.random() * 8);
    ctx.lineTo(6, ship.h / 3);
    ctx.fill();
  }
  ctx.restore();

  // Explosions
  explosions.forEach(e => {
    ctx.globalAlpha = Math.max(0, e.life);
    ctx.fillStyle = e.color;
    ctx.fillRect(e.x - e.size / 2, e.y - e.size / 2, e.size, e.size);
  });
  ctx.globalAlpha = 1;

  // HUD
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText(`${score}`, 15, 35);
  ctx.font = '14px system-ui';
  ctx.fillStyle = '#8b949e';
  ctx.fillText(`Level ${level}`, 15, 55);
  ctx.fillText(`Best: ${highScore}`, 15, 73);
  // Lives
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ff6b6b';
  ctx.font = '20px system-ui';
  ctx.fillText('❤️'.repeat(lives), W - 15, 35);
  // Powerup indicators
  let indicatorY = 55;
  if (shieldTimer > 0) { ctx.fillStyle = '#58a6ff'; ctx.font = '14px system-ui'; ctx.fillText(`🛡️ ${Math.ceil(shieldTimer / 60)}s`, W - 15, indicatorY); indicatorY += 18; }
  if (rapidTimer > 0) { ctx.fillStyle = '#ffcc00'; ctx.font = '14px system-ui'; ctx.fillText(`⚡ ${Math.ceil(rapidTimer / 60)}s`, W - 15, indicatorY); }

  if (state === STATE.DEAD) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff6b6b';
    ctx.font = 'bold 48px system-ui';
    ctx.fillText('DESTROYED', W / 2, H / 2 - 50);
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 32px system-ui';
    ctx.fillText(`Score: ${score}`, W / 2, H / 2);
    ctx.fillStyle = '#8b949e';
    ctx.font = '16px system-ui';
    ctx.fillText(`Level reached: ${level}`, W / 2, H / 2 + 35);
    if (score === highScore && score > 0) {
      ctx.fillStyle = '#00ff88';
      ctx.font = 'bold 20px system-ui';
      ctx.fillText('🏆 NEW HIGH SCORE!', W / 2, H / 2 + 70);
    }
    ctx.fillStyle = '#8b949e';
    ctx.font = '18px system-ui';
    ctx.fillText('Click or tap to continue', W / 2, H / 2 + 110);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
