// ========== INPUT STATE ==========
let inputValue='';
let currentPuzzle=null;
let puzzleState='input';
let messageText='';
let messageTimer=0;

// ========== SAVE/LOAD ==========
function saveGame(){
  const save={
    room:currentRoom,
    inv:inventory,
    solved:Array.from(solvedPuzzles),
    hints:usedHints,
    choices:gameChoices,
    time:timeStarted
  };
  localStorage.setItem('escaperoom_save',JSON.stringify(save));
  showMessage('Game saved!');
}

function loadGame(){
  const saved=localStorage.getItem('escaperoom_save');
  if(!saved)return false;
  try{
    const save=JSON.parse(saved);
    currentRoom=save.room;
    inventory=save.inv||[];
    solvedPuzzles=new Set(save.solved||[]);
    usedHints=save.hints||0;
    gameChoices=save.choices||{};
    timeStarted=save.time||Date.now();
    return true;
  }catch(e){return false}
}

function clearSave(){
  localStorage.removeItem('escaperoom_save');
}

function newGame(){
  currentRoom='livingRoom';
  inventory=[];
  solvedPuzzles=new Set();
  usedHints=0;
  gameChoices={};
  timeStarted=Date.now();
  state=STATE.PLAYING;
  clearSave();
}

// ========== HELPERS ==========
function showMessage(msg){
  messageText=msg;
  messageTimer=120;
}

function hasItem(item){
  return inventory.includes(item);
}

function addItem(item){
  if(!hasItem(item)){
    inventory.push(item);
    showMessage(`Found: ${item}!`);
  }
}

function checkRequirements(puzzle){
  if(!puzzle.requires)return true;
  for(let req of puzzle.requires){
    if(!hasItem(req))return false;
  }
  return true;
}

function solvePuzzle(puzzleId,userAnswer){
  const puzzle=puzzles[puzzleId];
  if(!puzzle||puzzle.complete)return false;
  
  let correct=false;
  if(puzzle.type==='riddle'||puzzle.type==='code'||puzzle.type==='inspect'){
    correct=userAnswer.toLowerCase().trim()===puzzle.answer.toLowerCase();
  }else if(puzzle.type==='choice'){
    gameChoices.finalChoice=parseInt(userAnswer);
    correct=true;
  }else{
    correct=userAnswer===puzzle.answer||userAnswer.toLowerCase()==='yes';
  }
  
  if(correct){
    puzzle.complete=true;
    solvedPuzzles.add(puzzleId);
    if(puzzle.reward){
      if(puzzle.reward==='ending'){
        state=STATE.ENDING;
      }else{
        addItem(puzzle.reward);
      }
    }
    saveGame();
    return true;
  }
  return false;
}

function getHint(puzzleId){
  if(usedHints>=maxHints){
    showMessage('No hints remaining!');
    return null;
  }
  const puzzle=puzzles[puzzleId];
  if(puzzle&&puzzle.hint){
    usedHints++;
    saveGame();
    return puzzle.hint;
  }
  return null;
}

// ========== RENDERING ==========
function drawRoom(){
  const room=rooms[currentRoom];
  if(!room)return;
  
  ctx.fillStyle=room.bg;
  ctx.fillRect(0,0,W,H);
  
  // Draw stars/ambiance
  for(let i=0;i<20;i++){
    const x=(i*97+currentRoom.length*13)%W;
    const y=(i*67+currentRoom.length*7)%H;
    ctx.fillStyle=`rgba(255,255,255,${0.1+Math.sin(Date.now()*0.001+i)*0.05})`;
    ctx.fillRect(x,y,1,1);
  }
  
  // Draw objects
  room.objects.forEach(obj=>{
    ctx.fillStyle=obj.color;
    ctx.fillRect(obj.x,obj.y,obj.w,obj.h);
    ctx.strokeStyle='#ffffff33';
    ctx.lineWidth=2;
    ctx.strokeRect(obj.x,obj.y,obj.w,obj.h);
    
    // Label
    ctx.fillStyle='#fff';
    ctx.font='bold 11px system-ui';
    ctx.textAlign='center';
    ctx.fillText(obj.label,obj.x+obj.w/2,obj.y-5);
    
    // Solved indicator
    if(solvedPuzzles.has(obj.id)){
      ctx.fillStyle='#00ff88';
      ctx.font='bold 16px system-ui';
      ctx.fillText('✓',obj.x+obj.w-10,obj.y+20);
    }
  });
  
  // Draw exits
  room.exits.forEach(exit=>{
    if(exit.hidden&&!solvedPuzzles.has(exit.requires))return;
    ctx.fillStyle='#4444ff';
    ctx.fillRect(exit.x,exit.y,exit.w,exit.h);
    ctx.strokeStyle='#6666ff';
    ctx.lineWidth=2;
    ctx.strokeRect(exit.x,exit.y,exit.w,exit.h);
    ctx.fillStyle='#fff';
    ctx.font='bold 12px system-ui';
    ctx.textAlign='center';
    ctx.fillText(exit.dir,exit.x+exit.w/2,exit.y+exit.h/2+4);
  });
  
  // Room name
  ctx.fillStyle='#ffcc00';
  ctx.font='bold 24px system-ui';
  ctx.textAlign='center';
  ctx.fillText(room.name,W/2,30);
  
  // Room description
  ctx.fillStyle='#aaa';
  ctx.font='14px system-ui';
  ctx.fillText(room.desc,W/2,55);
  
  // Progress
  const totalPuzzles=Object.keys(puzzles).length;
  const solved=solvedPuzzles.size;
  ctx.fillStyle='#00ff88';
  ctx.font='bold 13px system-ui';
  ctx.textAlign='left';
  ctx.fillText(`Progress: ${solved}/${totalPuzzles}`,10,H-10);
  
  // Hints remaining
  ctx.fillStyle='#ffaa00';
  ctx.textAlign='right';
  ctx.fillText(`Hints: ${maxHints-usedHints}`,W-10,H-10);
  
  // Message
  if(messageTimer>0){
    messageTimer--;
    ctx.fillStyle='rgba(0,0,0,0.8)';
    ctx.fillRect(W/2-150,H/2-30,300,60);
    ctx.fillStyle='#00ff88';
    ctx.font='bold 16px system-ui';
    ctx.textAlign='center';
    ctx.fillText(messageText,W/2,H/2+5);
  }
}

function drawInventory(){
  ctx.fillStyle='#1a1a2a';
  ctx.fillRect(0,H-100,W,100);
  ctx.strokeStyle='#333';
  ctx.lineWidth=2;
  ctx.strokeRect(0,H-100,W,100);
  
  ctx.fillStyle='#ffcc00';
  ctx.font='bold 16px system-ui';
  ctx.textAlign='left';
  ctx.fillText('INVENTORY',10,H-75);
  
  const startX=10;
  const startY=H-55;
  const spacing=90;
  
  inventory.forEach((item,i)=>{
    const x=startX+i*spacing;
    ctx.fillStyle='#3a3a4a';
    ctx.fillRect(x,startY,80,40);
    ctx.strokeStyle='#555';
    ctx.strokeRect(x,startY,80,40);
    ctx.fillStyle='#fff';
    ctx.font='11px system-ui';
    ctx.textAlign='center';
    const shortName=item.length>10?item.substring(0,9)+'..':item;
    ctx.fillText(shortName,x+40,startY+24);
  });
  
  if(inventory.length===0){
    ctx.fillStyle='#666';
    ctx.font='13px system-ui';
    ctx.textAlign='center';
    ctx.fillText('No items yet',W/2,startY+20);
  }
}

function drawPuzzle(){
  if(!currentPuzzle)return;
  const puzzle=puzzles[currentPuzzle];
  if(!puzzle)return;
  
  // Overlay
  ctx.fillStyle='rgba(0,0,0,0.85)';
  ctx.fillRect(0,0,W,H);
  
  // Puzzle box
  const boxW=Math.min(500,W-40);
  const boxH=Math.min(400,H-100);
  const boxX=(W-boxW)/2;
  const boxY=(H-boxH)/2;
  
  ctx.fillStyle='#1a1a2a';
  ctx.fillRect(boxX,boxY,boxW,boxH);
  ctx.strokeStyle='#444';
  ctx.lineWidth=3;
  ctx.strokeRect(boxX,boxY,boxW,boxH);
  
  // Title
  ctx.fillStyle='#ffcc00';
  ctx.font='bold 20px system-ui';
  ctx.textAlign='center';
  ctx.fillText(puzzle.title,W/2,boxY+30);
  
  // Description
  ctx.fillStyle='#aaa';
  ctx.font='14px system-ui';
  wrapText(ctx,puzzle.desc,W/2,boxY+60,boxW-40,20);
  
  // Question
  if(puzzle.question){
    ctx.fillStyle='#fff';
    ctx.font='bold 15px system-ui';
    wrapText(ctx,puzzle.question,W/2,boxY+120,boxW-40,22);
  }
  
  // Check requirements
  if(!checkRequirements(puzzle)){
    ctx.fillStyle='#ff6b6b';
    ctx.font='bold 14px system-ui';
    ctx.fillText('Missing required items!',W/2,boxY+200);
    ctx.fillStyle='#ffaa00';
    ctx.font='12px system-ui';
    const missing=puzzle.requires.filter(r=>!hasItem(r));
    ctx.fillText(`Need: ${missing.join(', ')}`,W/2,boxY+225);
  }else if(puzzleState==='input'){
    // Input field
    ctx.fillStyle='#2a2a3a';
    ctx.fillRect(boxX+20,boxY+boxH-120,boxW-40,40);
    ctx.strokeStyle='#666';
    ctx.lineWidth=2;
    ctx.strokeRect(boxX+20,boxY+boxH-120,boxW-40,40);
    
    ctx.fillStyle='#fff';
    ctx.font='16px system-ui';
    ctx.textAlign='left';
    ctx.fillText(inputValue+'|',boxX+30,boxY+boxH-93);
  }else if(puzzleState==='correct'){
    ctx.fillStyle='#00ff88';
    ctx.font='bold 18px system-ui';
    ctx.textAlign='center';
    ctx.fillText('✓ SOLVED!',W/2,boxY+boxH-90);
    if(puzzle.reward&&puzzle.reward!=='ending'){
      ctx.fillStyle='#ffcc00';
      ctx.font='14px system-ui';
      ctx.fillText(`Received: ${puzzle.reward}`,W/2,boxY+boxH-65);
    }
  }else if(puzzleState==='wrong'){
    ctx.fillStyle='#ff6b6b';
    ctx.font='bold 16px system-ui';
    ctx.textAlign='center';
    ctx.fillText('✗ Incorrect',W/2,boxY+boxH-90);
  }
  
  // Buttons
  const btnY=boxY+boxH-40;
  const btnW=80;
  const btnH=30;
  
  // Submit
  ctx.fillStyle='#00ff88';
  ctx.fillRect(W/2-btnW-5,btnY,btnW,btnH);
  ctx.fillStyle='#000';
  ctx.font='bold 13px system-ui';
  ctx.textAlign='center';
  ctx.fillText('SUBMIT',W/2-btnW/2-5,btnY+20);
  
  // Close
  ctx.fillStyle='#ff6b6b';
  ctx.fillRect(W/2+5,btnY,btnW,btnH);
  ctx.fillStyle='#000';
  ctx.fillText('CLOSE',W/2+btnW/2+5,btnY+20);
  
  // Hint button
  if(usedHints<maxHints&&puzzle.hint){
    ctx.fillStyle='#ffaa00';
    ctx.fillRect(boxX+boxW-90,boxY+10,80,25);
    ctx.fillStyle='#000';
    ctx.font='bold 12px system-ui';
    ctx.fillText('HINT',boxX+boxW-50,boxY+26);
  }
}

function drawMenu(){
  ctx.fillStyle='#0a0a1a';
  ctx.fillRect(0,0,W,H);
  
  // Stars
  for(let i=0;i<50;i++){
    const x=(i*123)%W;
    const y=(i*89)%H;
    ctx.fillStyle=`rgba(255,255,255,${0.2+Math.sin(Date.now()*0.001+i)*0.1})`;
    ctx.fillRect(x,y,2,2);
  }
  
  // Title
  ctx.fillStyle='#ffcc00';
  ctx.shadowColor='#ffcc00';
  ctx.shadowBlur=20;
  ctx.font='bold 48px system-ui';
  ctx.textAlign='center';
  ctx.fillText('ESCAPE ROOM',W/2,H/2-120);
  ctx.shadowBlur=0;
  
  // Subtitle
  ctx.fillStyle='#00ff88';
  ctx.font='20px system-ui';
  ctx.fillText('The Mystery of the Ancient House',W/2,H/2-80);
  
  // Instructions
  ctx.fillStyle='#aaa';
  ctx.font='14px system-ui';
  ctx.fillText('Point & click to interact • Solve 30+ puzzles',W/2,H/2-40);
  ctx.fillText('5 rooms • 4 different endings • 3 hints',W/2,H/2-20);
  
  // Buttons
  const hasSave=localStorage.getItem('escaperoom_save');
  
  ctx.fillStyle='#00ff88';
  ctx.fillRect(W/2-100,H/2+20,200,50);
  ctx.fillStyle='#000';
  ctx.font='bold 18px system-ui';
  ctx.fillText('NEW GAME',W/2,H/2+50);
  
  if(hasSave){
    ctx.fillStyle='#58a6ff';
    ctx.fillRect(W/2-100,H/2+80,200,50);
    ctx.fillStyle='#000';
    ctx.fillText('CONTINUE',W/2,H/2+110);
  }
  
  // Progress indicator
  if(hasSave){
    ctx.fillStyle='#666';
    ctx.font='12px system-ui';
    ctx.fillText('(Saved game found)',W/2,H/2+150);
  }
  
  // Credits
  ctx.fillStyle='#666';
  ctx.font='13px system-ui';
  ctx.fillText('⚡ JellyBolt Games',W/2,H-20);
}

function drawEnding(){
  ctx.fillStyle='#0a0a1a';
  ctx.fillRect(0,0,W,H);
  
  const choice=gameChoices.finalChoice||1;
  let title='',desc='',color='';
  
  switch(choice){
    case 1:
      title='ENDING: DESTROYER';
      desc='You shattered the orb, releasing its power into the void.\nThe house crumbles, but the world is safe from corruption.\nYou escape into the night, forever changed.';
      color='#ff6b6b';
      break;
    case 2:
      title='ENDING: KEEPER';
      desc='You claimed the orb for yourself.\nIts power courses through you, granting immortality.\nBut at what cost? The house becomes your eternal prison.';
      color='#ffaa00';
      break;
    case 3:
      title='ENDING: SAVIOR';
      desc='You chose to share the orb\'s power with the world.\nThe ancient magic spreads, healing and enlightening all.\nYou are remembered as a hero for generations.';
      color='#00ff88';
      break;
    case 4:
      title='ENDING: GUARDIAN';
      desc='You hid the orb away, sealing it from both good and evil.\nThe house accepts you as its new keeper.\nYou walk between worlds, protecting the secret forever.';
      color='#58a6ff';
      break;
  }
  
  ctx.fillStyle=color;
  ctx.shadowColor=color;
  ctx.shadowBlur=30;
  ctx.font='bold 36px system-ui';
  ctx.textAlign='center';
  ctx.fillText(title,W/2,H/2-100);
  ctx.shadowBlur=0;
  
  ctx.fillStyle='#fff';
  ctx.font='16px system-ui';
  const lines=desc.split('\n');
  lines.forEach((line,i)=>{
    ctx.fillText(line,W/2,H/2-40+i*30);
  });
  
  // Stats
  const timePlayed=timeStarted?Math.floor((Date.now()-timeStarted)/1000):0;
  const mins=Math.floor(timePlayed/60);
  const secs=timePlayed%60;
  
  ctx.fillStyle='#aaa';
  ctx.font='14px system-ui';
  ctx.fillText(`Puzzles Solved: ${solvedPuzzles.size}/${Object.keys(puzzles).length}`,W/2,H/2+80);
  ctx.fillText(`Time: ${mins}m ${secs}s`,W/2,H/2+100);
  ctx.fillText(`Hints Used: ${usedHints}/${maxHints}`,W/2,H/2+120);
  
  // Menu button
  ctx.fillStyle='#00ff88';
  ctx.fillRect(W/2-80,H/2+150,160,45);
  ctx.fillStyle='#000';
  ctx.font='bold 16px system-ui';
  ctx.fillText('MAIN MENU',W/2,H/2+180);
}

function wrapText(ctx,text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');
  let line='';
  let yPos=y;
  
  for(let word of words){
    const testLine=line+word+' ';
    const metrics=ctx.measureText(testLine);
    if(metrics.width>maxWidth&&line!==''){
      ctx.fillText(line,x,yPos);
      line=word+' ';
      yPos+=lineHeight;
    }else{
      line=testLine;
    }
  }
  ctx.fillText(line,x,yPos);
}

// ========== INPUT HANDLING ==========
function handleClick(x,y){
  if(state===STATE.MENU){
    const hasSave=localStorage.getItem('escaperoom_save');
    if(x>=W/2-100&&x<=W/2+100&&y>=H/2+20&&y<=H/2+70){
      newGame();
    }else if(hasSave&&x>=W/2-100&&x<=W/2+100&&y>=H/2+80&&y<=H/2+130){
      if(loadGame()){
        state=STATE.PLAYING;
      }else{
        newGame();
      }
    }
    return;
  }
  
  if(state===STATE.ENDING){
    if(x>=W/2-80&&x<=W/2+80&&y>=H/2+150&&y<=H/2+195){
      clearSave();
      state=STATE.MENU;
    }
    return;
  }
  
  if(state===STATE.PUZZLE){
    if(!currentPuzzle)return;
    const puzzle=puzzles[currentPuzzle];
    const boxW=Math.min(500,W-40);
    const boxH=Math.min(400,H-100);
    const boxX=(W-boxW)/2;
    const boxY=(H-boxH)/2;
    const btnY=boxY+boxH-40;
    
    // Hint button
    if(usedHints<maxHints&&puzzle.hint){
      if(x>=boxX+boxW-90&&x<=boxX+boxW-10&&y>=boxY+10&&y<=boxY+35){
        const hint=getHint(currentPuzzle);
        if(hint){
          showMessage(`Hint: ${hint}`);
        }
      }
    }
    
    // Submit button
    if(x>=W/2-85&&x<=W/2-5&&y>=btnY&&y<=btnY+30){
      if(checkRequirements(puzzle)){
        const solved=solvePuzzle(currentPuzzle,inputValue);
        puzzleState=solved?'correct':'wrong';
        if(solved){
          setTimeout(()=>{
            state=STATE.PLAYING;
            currentPuzzle=null;
            inputValue='';
            puzzleState='input';
          },1500);
        }else{
          setTimeout(()=>{puzzleState='input'},1000);
        }
      }
    }
    
    // Close button
    if(x>=W/2+5&&x<=W/2+85&&y>=btnY&&y<=btnY+30){
      state=STATE.PLAYING;
      currentPuzzle=null;
      inputValue='';
      puzzleState='input';
    }
    return;
  }
  
  if(state===STATE.PLAYING){
    const room=rooms[currentRoom];
    if(!room)return;
    
    // Check objects
    for(let obj of room.objects){
      if(x>=obj.x&&x<=obj.x+obj.w&&y>=obj.y&&y<=obj.y+obj.h){
        if(puzzles[obj.id]&&!puzzles[obj.id].complete){
          currentPuzzle=obj.id;
          state=STATE.PUZZLE;
          inputValue='';
          puzzleState='input';
        }else if(solvedPuzzles.has(obj.id)){
          showMessage('Already solved!');
        }
        return;
      }
    }
    
    // Check exits
    for(let exit of room.exits){
      if(exit.hidden&&!solvedPuzzles.has(exit.requires))continue;
      if(x>=exit.x&&x<=exit.x+exit.w&&y>=exit.y&&y<=exit.y+exit.h){
        currentRoom=exit.to;
        saveGame();
        return;
      }
    }
  }
}

function handleKeyPress(key){
  if(state!==STATE.PUZZLE||puzzleState!=='input')return;
  
  if(key==='Backspace'){
    inputValue=inputValue.slice(0,-1);
  }else if(key==='Enter'){
    if(!currentPuzzle)return;
    const puzzle=puzzles[currentPuzzle];
    if(checkRequirements(puzzle)){
      const solved=solvePuzzle(currentPuzzle,inputValue);
      puzzleState=solved?'correct':'wrong';
      if(solved){
        setTimeout(()=>{
          state=STATE.PLAYING;
          currentPuzzle=null;
          inputValue='';
          puzzleState='input';
        },1500);
      }else{
        setTimeout(()=>{puzzleState='input'},1000);
      }
    }
  }else if(key.length===1){
    if(inputValue.length<30){
      inputValue+=key;
    }
  }
}

// ========== EVENT LISTENERS ==========
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const x=e.clientX-rect.left;
  const y=e.clientY-rect.top;
  handleClick(x,y);
});

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const touch=e.touches[0];
  const x=touch.clientX-rect.left;
  const y=touch.clientY-rect.top;
  handleClick(x,y);
},{passive:false});

window.addEventListener('keydown',e=>{
  handleKeyPress(e.key);
});

// ========== GAME LOOP ==========
function update(){
  // Update logic here if needed
}

function draw(){
  if(state===STATE.MENU){
    drawMenu();
  }else if(state===STATE.PLAYING){
    drawRoom();
    drawInventory();
  }else if(state===STATE.PUZZLE){
    drawRoom();
    drawInventory();
    drawPuzzle();
  }else if(state===STATE.ENDING){
    drawEnding();
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
