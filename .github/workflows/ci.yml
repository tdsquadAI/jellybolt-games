name: CI - JellyBolt Games Hub

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Hub Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          find . -name "*.json" ! -path "./node_modules/*" | while read f; do
            echo "Checking $f..."
            python3 -m json.tool "$f" > /dev/null && echo "OK: $f" || (echo "INVALID JSON: $f" && exit 1)
          done

      - name: Check required directories exist
        run: |
          ls store-listings/ && echo "✅ store-listings/ found"
          ls .squad/ && echo "✅ .squad/ found"